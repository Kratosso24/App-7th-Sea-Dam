function ArcaniView({favs,saveFavs,customItems,saveCustom}){
  const[modal,setModal]=useState(null);
  const[form,sf]=useState(null);
  const[q,setQ]=useState('');

  const all=[...ARC_ITEMS,...customItems];
  const filtered=q?all.filter(a=>
    a.nome.toLowerCase().includes(q.toLowerCase())||
    (a.vn||'').toLowerCase().includes(q.toLowerCase())||
    (a.hn||'').toLowerCase().includes(q.toLowerCase())
  ):all;

  const isFav=id=>!!favs[id];
  const toggleFav=id=>saveFavs(p=>{const n={...p};n[id]?delete n[id]:n[id]=true;return n;});
  const favItems=all.filter(a=>isFav(a.id));

  const drag=useDragOrder(saveCustom);
  const blank=()=>({id:uid(),nome:'',vn:'',vd:'',hn:'',hd:'',isCustom:true});
  const startNew=()=>{sf(blank());setModal('new');};
  const startEdit=a=>{sf({...a});setModal(a.id);};
  const handleSave=()=>{
    if(!form||!form.nome.trim())return;
    if(modal==='new') saveCustom(p=>[...p,form]);
    else saveCustom(p=>p.map(a=>a.id===modal?form:a));
    setModal(null);sf(null);
  };
  const handleCancel=()=>{setModal(null);sf(null);};
  const del=id=>{if(window.confirm('Eliminare questo Arcano?'))saveCustom(p=>p.filter(a=>a.id!==id));};

  const ArcCard=({item,isFavSec})=>{
    const fav=isFav(item.id);
    return h('div',{className:'card',style:{marginBottom:8},...(item.isCustom&&!isFavSec?drag.dragProps(item.id):{})},
      // Header
      h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:10,paddingBottom:8,borderBottom:'1px solid var(--border)'}},
        item.isCustom&&!isFavSec&&DRAG_HANDLE,
        h('span',{style:{fontSize:20}},'🎴'),
        h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:18,flex:1}},item.nome),
        item.isCustom&&h('span',{className:'badge badge-gold'},'Custom'),
        h('button',{onClick:()=>toggleFav(item.id),title:fav?'Rimuovi dai preferiti':'Aggiungi ai preferiti',
          style:{background:'transparent',border:'none',cursor:'pointer',fontSize:20,
            color:fav?'var(--gold)':'var(--text3)',lineHeight:1,transition:'color .15s'}
        },fav?'⭐':'☆'),
        item.isCustom&&!isFavSec&&h('button',{className:'btn-ghost',onClick:()=>startEdit(item),style:{fontSize:12,padding:'2px 6px'}},'✎'),
        item.isCustom&&!isFavSec&&h('button',{className:'btn-danger',onClick:()=>del(item.id),style:{fontSize:12,padding:'2px 6px'}},'🗑')
      ),
      // Virtù + Hubris a due colonne
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
        h('div',{style:{background:'var(--success-bg)',border:'1px solid var(--success-fg)',borderRadius:'var(--r2)',padding:'8px 10px'}},
          h('div',{style:{fontSize:10,color:'var(--success-fg)',fontFamily:'Cinzel,serif',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}},'✨ Virtù'),
          h('div',{style:{fontFamily:'IM Fell English,serif',fontSize:14,marginBottom:4}},item.vn),
          h('div',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.65}},item.vd)
        ),
        h('div',{style:{background:'var(--danger-bg)',border:'1px solid var(--danger-fg)',borderRadius:'var(--r2)',padding:'8px 10px'}},
          h('div',{style:{fontSize:10,color:'var(--danger-fg)',fontFamily:'Cinzel,serif',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}},'⚡ Hubris'),
          h('div',{style:{fontFamily:'IM Fell English,serif',fontSize:14,marginBottom:4}},item.hn),
          h('div',{style:{fontSize:12,color:'var(--text2)',lineHeight:1.65}},item.hd)
        )
      )
    );
  };

  return h(Fragment,null,
    h('div',{className:'sec-header'},
      h('h2',{className:'sec-title'},'Arcani'),
      h('button',{className:'btn-gold',onClick:startNew},'+ Aggiungi')
    ),
    h('div',{className:'search-row',style:{marginBottom:14}},
      h('input',{placeholder:'Cerca per nome, virtù o hubris...',value:q,onChange:e=>setQ(e.target.value),style:{flex:1}})
    ),
    // Preferiti
    favItems.length>0&&h(Fragment,null,
      h('div',{style:{fontSize:11,color:'var(--gold)',fontFamily:'Cinzel,serif',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},'⭐ Preferiti'),
      favItems.map(a=>h(ArcCard,{key:a.id+'_f',item:a,isFavSec:true})),
      h('div',{style:{height:2,background:'linear-gradient(90deg,transparent,var(--gold3),transparent)',margin:'12px 0 16px'}})
    ),
    // Tutti gli arcani
    filtered.length===0&&h('div',{className:'empty'},'Nessun Arcano trovato.'),
    filtered.map(a=>h(ArcCard,{key:a.id,item:a,isFavSec:false})),
    modal&&form&&h(ArcCustomModal,{form,sf,onSave:handleSave,onCancel:handleCancel,isNew:modal==='new'})
  );
}

function NemModal({form,sf,onSave,onCancel,isNew}){
  const f=(k,v)=>sf(p=>({...p,[k]:v}));
  const[vanQ,setVanQ]=useState('');const[vanOpen,setVanOpen]=useState(false);
  const selVA=id=>{const a=ARC_ITEMS.find(a=>a.id===id);sf(p=>({...p,virtu_arcano_id:id,virtu:a?a.vn:p.virtu}));};
  const selHA=id=>{const a=ARC_ITEMS.find(a=>a.id===id);sf(p=>({...p,hubris_arcano_id:id,hubris:a?a.hn:p.hubris}));};
  const togV=id=>sf(p=>{const ids=p.van_ids||[];return{...p,van_ids:ids.includes(id)?ids.filter(v=>v!==id):[...ids,id]};});
  const togQ=id=>sf(p=>{const ids=p.qualita_ids||[];return{...p,qualita_ids:ids.includes(id)?ids.filter(q=>q!==id):[...ids,id]};});
  const tipo=form.tipo;
  const gm=(form.forza||0)+(form.influenza||0);
  const gd=gradoMV(gm);
  const hasTerr=(form.qualita_ids||[]).includes('ter');
  const paura=hasTerr?2*(1+Math.floor((form.forza||0)/5)):(1+Math.floor((form.forza||0)/5));

  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onCancel();}},
    h('div',{className:'modal',style:{maxWidth:640}},
      h('div',{className:'modal-title'},isNew?'Nuovo Nemico':'Modifica Nemico'),
      // Selettore tipo
      h('div',{style:{display:'flex',gap:6,marginBottom:12}},
        ['Malvagio','Sgherri','Mostro'].map(t=>h('button',{key:t,
          className:tipo===t?'btn-gold':'btn',onClick:()=>f('tipo',t),style:{flex:1}},
          t==='Malvagio'?'😈 Malvagio':t==='Sgherri'?'⚔️ Sgherri':'👹 Mostro'
        ))
      ),
      // Nome + Stato
      h('div',{className:'grid2',style:{marginBottom:10}},
        h('div',null,h('label',{className:'lbl'},'Nome'),h('input',{value:form.nome,onChange:e=>f('nome',e.target.value),placeholder:'Nome del nemico'})),
        h('div',null,h('label',{className:'lbl'},'Stato'),h('select',{value:form.stato,onChange:e=>f('stato',e.target.value)},
          ['Attivo','Sconfitto','Inerme'].map(s=>h('option',{key:s},s))
        ))
      ),

      // ── MALVAGIO ──
      tipo==='Malvagio'&&h(Fragment,null,
        h('div',{className:'grid2',style:{marginBottom:6}},
          h('div',null,h('label',{className:'lbl'},'Forza'),h('input',{type:'number',min:1,max:20,value:form.forza,onChange:e=>f('forza',parseInt(e.target.value)||1)})),
          h('div',null,h('label',{className:'lbl'},'Influenza'),h('input',{type:'number',min:1,max:20,value:form.influenza,onChange:e=>f('influenza',parseInt(e.target.value)||1)}))
        ),
        h('div',{style:{marginBottom:10,padding:'6px 10px',background:'var(--bg3)',borderRadius:'var(--r2)',display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}},
          h('span',{style:{fontSize:12,color:'var(--text3)'}},'Grado di Malvagità:'),
          h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:16}},gm),
          h('span',{className:'badge '+gd.cls},gd.nome),
          h('span',{style:{fontSize:11,color:'var(--text3)'}}, 'Abilità ÷2: '+Math.ceil((form.forza||1)/2)+' · Vantaggi: '+(5+form.forza)+' pt')
        ),
        // Arcani
        h('div',{className:'grid2',style:{marginBottom:10}},
          h('div',null,h('label',{className:'lbl'},'Carta — Virtù'),
            h('select',{value:form.virtu_arcano_id||'',onChange:e=>selVA(e.target.value)},
              h('option',{value:''},'— Scegli —'),ARC_ITEMS.map(a=>h('option',{key:a.id,value:a.id},a.nome+' ('+a.vn+')'))
            ),
            form.virtu_arcano_id&&h('p',{style:{fontSize:11,color:'var(--success-fg)',fontStyle:'italic',margin:'3px 0 0'}},ARC_ITEMS.find(a=>a.id===form.virtu_arcano_id)?.vd||'')
          ),
          h('div',null,h('label',{className:'lbl'},'Carta — Hubris'),
            h('select',{value:form.hubris_arcano_id||'',onChange:e=>selHA(e.target.value)},
              h('option',{value:''},'— Scegli —'),ARC_ITEMS.map(a=>h('option',{key:a.id,value:a.id},a.nome+' ('+a.hn+')'))
            ),
            form.hubris_arcano_id&&h('p',{style:{fontSize:11,color:'var(--danger-fg)',fontStyle:'italic',margin:'3px 0 0'}},ARC_ITEMS.find(a=>a.id===form.hubris_arcano_id)?.hd||'')
          )
        ),
        // Vantaggi
        h('div',{style:{marginBottom:10}},
          h('label',{className:'lbl'},'Vantaggi (max '+(5+form.forza)+' pt)'),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:4,padding:'4px 0',minHeight:24}},
            (form.van_ids||[]).map(id=>{const v=VAN_ITEMS.find(v=>v.id===id);if(!v)return null;
              return h('span',{key:id,className:'tag',style:{fontSize:11,display:'inline-flex',gap:4,cursor:'pointer'},onClick:()=>togV(id)},v.nome,' ×');}).filter(Boolean)
          ),
          h('div',{style:{display:'flex',gap:4}},
            h('input',{placeholder:'Aggiungi vantaggio...',value:vanQ,onChange:e=>{setVanQ(e.target.value);setVanOpen(true);},onFocus:()=>setVanOpen(true),style:{flex:1,fontSize:12}}),
            h('button',{className:'btn-ghost',onClick:()=>setVanOpen(v=>!v),style:{padding:'2px 6px',fontSize:11}},vanOpen?'▲':'▼')
          ),
          vanOpen&&h('div',{style:{maxHeight:120,overflowY:'auto',marginTop:4,background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:'var(--r2)'}},
            Object.entries(VAN_CATS).map(([cid,cat])=>{
              const items=VAN_ITEMS.filter(v=>v.cat===cid&&(!vanQ||v.nome.toLowerCase().includes(vanQ.toLowerCase()))&&!(form.van_ids||[]).includes(v.id));
              if(!items.length)return null;
              return h('div',{key:cid},
                h('div',{style:{fontSize:9,color:'var(--text3)',padding:'2px 8px',background:'var(--bg3)',fontFamily:'Cinzel,serif',textTransform:'uppercase'}},cat.e+' '+cat.nome),
                items.map(v=>h('div',{key:v.id,style:{padding:'3px 10px',fontSize:12,cursor:'pointer',borderBottom:'1px solid var(--border)'},onClick:()=>{togV(v.id);setVanQ('');setVanOpen(false);}},v.nome))
              );}).filter(Boolean)
          )
        ),
        h('div',{style:{marginBottom:10}},h('label',{className:'lbl'},'Macchinazione corrente'),
          h('textarea',{value:form.macchinazione||'',onChange:e=>f('macchinazione',e.target.value),rows:2,placeholder:'Descrivi il piano attivo del Malvagio...'}))
      ),

      // ── SGHERRI ──
      tipo==='Sgherri'&&h(Fragment,null,
        h('div',{className:'grid2',style:{marginBottom:10}},
          h('div',null,h('label',{className:'lbl'},'Forza'),
            h('input',{type:'number',min:1,max:30,value:form.forza,onChange:e=>{const v=parseInt(e.target.value)||1;sf(p=>({...p,forza:v,forza_curr:v}));}})
          ),
          h('div',null,h('label',{className:'lbl'},'Tipo Squadra'),
            h('select',{value:form.tipo_squadra||'',onChange:e=>f('tipo_squadra',e.target.value)},
              TIPI_SQUADRA.map(t=>h('option',{key:t.id,value:t.id},t.nome))
            )
          )
        ),
        h('div',{style:{padding:'6px 10px',background:'var(--bg3)',borderRadius:'var(--r2)',fontSize:12,color:'var(--text3)',marginBottom:10}},
          'Infliggono ',h('strong',null,form.forza),' Ferite/turno (pari alla Forza attuale) · Per sconfiggerli: ridurre la Forza a 0'
        ),
        form.tipo_squadra&&h('div',{style:{padding:'6px 10px',background:'var(--warn-bg)',borderRadius:'var(--r2)',fontSize:12,color:'var(--warn-fg)',lineHeight:1.6,marginBottom:10}},
          h('strong',null,'Capacità (1PP): '),TIPI_SQUADRA.find(t=>t.id===form.tipo_squadra)?.desc||''
        )
      ),

      // ── MOSTRO ──
      tipo==='Mostro'&&h(Fragment,null,
        h('div',{className:'grid2',style:{marginBottom:6}},
          h('div',null,h('label',{className:'lbl'},'Forza'),h('input',{type:'number',min:1,max:30,value:form.forza,onChange:e=>f('forza',parseInt(e.target.value)||1)})),
          h('div',null,h('label',{className:'lbl'},'Tipo'),
            h('select',{value:form.umanoide?'um':'sem',onChange:e=>f('umanoide',e.target.value==='um')},
              h('option',{value:'sem'},'Bestia / Pura creatura'),h('option',{value:'um'},'Umanoide (Influenza + Vantaggi)')
            )
          )
        ),
        h('div',{style:{padding:'5px 10px',background:'var(--bg3)',borderRadius:'var(--r2)',fontSize:12,color:'var(--text3)',marginBottom:8}},
          'Grado Paura: ',h('strong',{style:{color:'var(--crimson)'}},paura),
          hasTerr&&h('span',{style:{marginLeft:6,color:'var(--danger-fg)'}},'(Terrificante ×2)'),
          ' · Abilità = Forza÷2 = ',h('strong',null,Math.ceil((form.forza||1)/2))
        ),
        form.umanoide&&h('div',{style:{marginBottom:8}},h('label',{className:'lbl'},'Influenza'),
          h('input',{type:'number',min:0,max:20,value:form.influenza||0,onChange:e=>f('influenza',parseInt(e.target.value)||0)})
        ),
        h('div',{style:{marginBottom:10}},
          h('label',{className:'lbl'},'Qualità Mostruose'),
          h('div',{style:{display:'flex',flexWrap:'wrap',gap:4,marginBottom:6}},
            QUALITA_MOSTRUOSE.map(q=>h('button',{key:q.id,
              className:(form.qualita_ids||[]).includes(q.id)?'btn-gold':'btn',
              style:{fontSize:11,padding:'3px 8px'},onClick:()=>togQ(q.id)},q.nome))
          ),
          (form.qualita_ids||[]).length>0&&h('div',{style:{maxHeight:100,overflowY:'auto',background:'var(--bg3)',borderRadius:'var(--r2)',padding:6}},
            (form.qualita_ids||[]).map(id=>{const q=QUALITA_MOSTRUOSE.find(q=>q.id===id);if(!q)return null;
              return h('div',{key:id,style:{fontSize:11,color:'var(--text2)',marginBottom:3,lineHeight:1.5}},h('strong',null,q.nome,': '),q.desc);})
          )
        )
      ),

      h('div',null,h('label',{className:'lbl'},'Note'),h('textarea',{value:form.note||'',onChange:e=>f('note',e.target.value),rows:2,placeholder:'Descrizione, segreti, comportamento...'})),
      h('div',{className:'form-actions'},h('button',{className:'btn',onClick:onCancel},'Annulla'),h('button',{className:'btn-gold',onClick:onSave},'✓ Salva'))
    )
  );
}

function NemiciView({data,save,qmFavs,saveQmFavs,qmCustom,saveQmCustom,sqFavs,saveSqFavs,sqCustom,saveSqCustom}){
  const[modal,setModal]=useState(null);const[form,sf]=useState(null);
  const[ex,setEx]=useState(null);const[ft,setFt]=useState('Tutto');
  const[qmModal,setQmModal]=useState(null);const[qmForm,sqf]=useState(null);
  const[sqModal,setSqModal]=useState(null);const[sqForm,ssf]=useState(null);
  const drag=useDragOrder(save);
  const dragQm=useDragOrder(saveQmCustom);
  const dragSq=useDragOrder(saveSqCustom);

  const filt=ft==='Tutto'?data:data.filter(n=>n.tipo===ft);
  const sN=()=>{sf(blankNem());setModal('new');};
  const sE=n=>{sf({...n,van_ids:[...(n.van_ids||[])],qualita_ids:[...(n.qualita_ids||[])]});setModal(n.id);};
  const hSave=()=>{if(!form||!form.nome.trim())return;modal==='new'?save(p=>[...p,form]):save(p=>p.map(n=>n.id===modal?form:n));setModal(null);sf(null);};
  const cx=()=>{setModal(null);sf(null);};
  const dl=id=>{if(window.confirm('Eliminare questo nemico?'))save(p=>p.filter(n=>n.id!==id));};
  const qU=(id,u)=>save(p=>p.map(n=>n.id===id?{...n,...u}:n));

  // Qualità Mostruose favorites + custom
  const isQmFav=id=>!!qmFavs[id];
  const togQmFav=id=>saveQmFavs(p=>{const n={...p};n[id]?delete n[id]:n[id]=true;return n;});
  const allQm=[...QUALITA_MOSTRUOSE,...qmCustom];
  const qmFavList=allQm.filter(q=>isQmFav(q.id));
  const saveQmItem=()=>{if(!qmForm||!qmForm.nome.trim())return;
    qmModal==='new'?saveQmCustom(p=>[...p,qmForm]):saveQmCustom(p=>p.map(q=>q.id===qmModal?qmForm:q));
    setQmModal(null);sqf(null);};
  const delQm=id=>{if(window.confirm('Eliminare questa qualità?'))saveQmCustom(p=>p.filter(q=>q.id!==id));};

  // Squadre favorites + custom
  const SQUADRE_LORE=TIPI_SQUADRA.filter(t=>t.id!=='');
  const isSqFav=id=>!!sqFavs[id];
  const togSqFav=id=>saveSqFavs(p=>{const n={...p};n[id]?delete n[id]:n[id]=true;return n;});
  const allSq=[...SQUADRE_LORE,...sqCustom];
  const sqFavList=allSq.filter(s=>isSqFav(s.id));
  const saveSqItem=()=>{if(!sqForm||!sqForm.nome.trim())return;
    sqModal==='new'?saveSqCustom(p=>[...p,sqForm]):saveSqCustom(p=>p.map(s=>s.id===sqModal?sqForm:s));
    setSqModal(null);ssf(null);};
  const delSq=id=>{if(window.confirm('Eliminare questa squadra?'))saveSqCustom(p=>p.filter(s=>s.id!==id));};

  const TICO={Malvagio:'😈',Sgherri:'⚔️',Mostro:'👹'};
  const TCLS={Malvagio:'badge-danger',Sgherri:'badge-warn',Mostro:'badge-dim'};

  // ── Render ref card (qualità o squadra) ──
  const RefCard=({item,isFav,onFav,isLore,onEdit,onDel,dragProps})=>
    h('div',{className:'card',style:{marginBottom:6},...(!isLore?dragProps:{})},
      h('div',{style:{display:'flex',alignItems:'flex-start',gap:10}},
        !isLore&&DRAG_HANDLE,
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}},
            h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:15}},item.nome),
            isLore&&h('span',{className:'badge badge-dim'},'Lore'),
            !isLore&&h('span',{className:'badge badge-gold'},'Custom')
          ),
          h('div',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.65}},item.desc||item.d||'')
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:4,flexShrink:0}},
          h('button',{onClick:()=>onFav(item.id),title:isFav?'Rimuovi dai preferiti':'Aggiungi ai preferiti',
            style:{background:'transparent',border:'none',cursor:'pointer',fontSize:18,
              color:isFav?'var(--gold)':'var(--text3)',padding:'2px 4px',lineHeight:1}},isFav?'⭐':'☆'),
          !isLore&&h('button',{className:'btn-ghost',onClick:()=>onEdit(item),style:{fontSize:12,padding:'2px 6px'}},'✎'),
          !isLore&&h('button',{className:'btn-danger',onClick:()=>onDel(item.id),style:{fontSize:12,padding:'2px 6px'}},'🗑')
        )
      )
    );

  return h(Fragment,null,
    h('div',{className:'sec-header'},
      h('h2',{className:'sec-title'},'Nemici'),
      (ft==='Tutto'||ft==='Malvagio'||ft==='Sgherri'||ft==='Mostro')&&h('button',{className:'btn-gold',onClick:sN},'+ Aggiungi'),
      ft==='Qualità'&&h('button',{className:'btn-gold',onClick:()=>{sqf({id:uid(),nome:'',desc:'',isCustom:true});setQmModal('new');}},'+ Qualità'),
      ft==='Squadre'&&h('button',{className:'btn-gold',onClick:()=>{ssf({id:uid(),nome:'',desc:'',isCustom:true});setSqModal('new');}},'+ Squadra')
    ),
    h('div',{className:'search-row'},
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        ['Tutto','Malvagio','Sgherri','Mostro','Qualità','Squadre'].map(t=>h('button',{key:t,
          className:'stab'+(ft===t?' on':''),onClick:()=>setFt(t)},
          t==='Tutto'?'Tutti':t==='Malvagio'?'😈 Malvagi':t==='Sgherri'?'⚔️ Sgherri':
          t==='Mostro'?'👹 Mostri':t==='Qualità'?'💢 Qualità':'⚔️ Squadre'
        ))
      )
    ),

    // ── QUALITÀ MOSTRUOSE ──
    ft==='Qualità'&&h(Fragment,null,
      qmFavList.length>0&&h(Fragment,null,
        h('div',{style:{fontSize:11,color:'var(--gold)',fontFamily:'Cinzel,serif',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},'⭐ Preferiti'),
        qmFavList.map(q=>h(RefCard,{key:q.id+'_f',item:q,isFav:true,onFav:togQmFav,isLore:!q.isCustom,
          onEdit:()=>{sqf({...q});setQmModal(q.id);},onDel:delQm,dragProps:{}})),
        h('div',{style:{height:2,background:'linear-gradient(90deg,transparent,var(--gold3),transparent)',margin:'12px 0 16px'}})
      ),
      h('div',{className:'lore-label',style:{marginBottom:6}},'QUALITÀ DAL MANUALE'),
      QUALITA_MOSTRUOSE.map(q=>h(RefCard,{key:q.id,item:q,isFav:isQmFav(q.id),onFav:togQmFav,isLore:true,onEdit:()=>{},onDel:()=>{},dragProps:{}})),
      qmCustom.length>0&&h(Fragment,null,
        h('div',{className:'lore-label',style:{marginTop:12,marginBottom:6}},'QUALITÀ PERSONALIZZATE'),
        qmCustom.map(q=>h(RefCard,{key:q.id,item:q,isFav:isQmFav(q.id),onFav:togQmFav,isLore:false,
          onEdit:i=>{sqf({...i});setQmModal(i.id);},onDel:delQm,dragProps:dragQm.dragProps(q.id)}))
      )
    ),

    // ── SQUADRE DI SGHERRI ──
    ft==='Squadre'&&h(Fragment,null,
      sqFavList.length>0&&h(Fragment,null,
        h('div',{style:{fontSize:11,color:'var(--gold)',fontFamily:'Cinzel,serif',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},'⭐ Preferiti'),
        sqFavList.map(s=>h(RefCard,{key:s.id+'_f',item:{...s,desc:s.desc||s.d||''},isFav:true,onFav:togSqFav,isLore:!s.isCustom,
          onEdit:()=>{ssf({...s});setSqModal(s.id);},onDel:delSq,dragProps:{}})),
        h('div',{style:{height:2,background:'linear-gradient(90deg,transparent,var(--gold3),transparent)',margin:'12px 0 16px'}})
      ),
      h('div',{className:'lore-label',style:{marginBottom:6}},'TIPI DAL MANUALE'),
      SQUADRE_LORE.map(s=>h(RefCard,{key:s.id,item:{...s,desc:s.desc||s.d||''},isFav:isSqFav(s.id),onFav:togSqFav,isLore:true,onEdit:()=>{},onDel:()=>{},dragProps:{}})),
      sqCustom.length>0&&h(Fragment,null,
        h('div',{className:'lore-label',style:{marginTop:12,marginBottom:6}},'TIPI PERSONALIZZATI'),
        sqCustom.map(s=>h(RefCard,{key:s.id,item:{...s,desc:s.desc||s.d||''},isFav:isSqFav(s.id),onFav:togSqFav,isLore:false,
          onEdit:i=>{ssf({...i});setSqModal(i.id);},onDel:delSq,dragProps:dragSq.dragProps(s.id)}))
      )
    ),

    // ── LISTA NEMICI ──
    (ft==='Tutto'||ft==='Malvagio'||ft==='Sgherri'||ft==='Mostro')&&h(Fragment,null,
      filt.length===0&&h('div',{className:'empty'},'Nessun nemico. Aggiungine uno!'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        filt.map(n=>{
          const gm=(n.forza||0)+(n.influenza||0);const gd=gradoMV(gm);
          const hasTerr=(n.qualita_ids||[]).includes('ter');
          const paura=hasTerr?2*(1+Math.floor((n.forza||0)/5)):(1+Math.floor((n.forza||0)/5));
          const isOpen=ex===n.id;const forzaCurr=n.forza_curr??n.forza;

            h('div',{style:{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer'},onClick:()=>setEx(isOpen?null:n.id)},

              h('span',{style:{fontSize:22,flexShrink:0,marginTop:2}},TICO[n.tipo]||'❓'),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}},
                  h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:17}},n.nome),
                  h('span',{className:'badge '+TCLS[n.tipo]},n.tipo),
                  n.stato!=='Attivo'&&h('span',{className:'badge '+(n.stato==='Inerme'?'badge-danger':'badge-dim')},n.stato),
                  n.tipo==='Malvagio'&&h('span',{className:'badge '+gd.cls},'GM '+gm+' — '+gd.nome),

                  n.tipo==='Mostro'&&paura>0&&h('span',{className:'badge badge-danger',style:{fontSize:10}},'Paura '+paura)
                ),
                !isOpen&&h('div',{style:{fontSize:12,color:'var(--text3)'}},
                  n.tipo==='Malvagio'&&('Forza '+n.forza+' · Influenza '+n.influenza+(n.virtu?' · ✨ '+n.virtu:'')+(n.hubris?' · ⚡ '+n.hubris:'')),
                  n.tipo==='Sgherri'&&(TIPI_SQUADRA.find(t=>t.id===n.tipo_squadra)?.nome||'Nessun tipo speciale'),
                  n.tipo==='Mostro'&&('Forza '+(n.forza||0)+((n.qualita_ids||[]).length?' · '+(n.qualita_ids||[]).map(id=>QUALITA_MOSTRUOSE.find(q=>q.id===id)?.nome||id).join(', '):''))
                )

// ═══════════════════════════ TRAME ═══════════════════════════════════════
const TIPI_TRAMA=[
  {id:'stagionale',nome:'Stagionale',e:'🌊',cls:'badge-info',desc:'Si sviluppa su diverse sessioni (5 Atti raccomandati). È la storia principale della campagna.'},
  {id:'episodica',nome:'Episodica',e:'🎭',cls:'badge-warn',desc:'Si risolve in una singola sessione (2-3 Atti). Ideale per vicende secondarie.'},
  {id:'personaggio',nome:'del Personaggio',e:'👤',cls:'badge-dim',desc:'Aiuta un PNG o permette a un Eroe di raggiungere gli scopi di un personaggio specifico.'},
  {id:'retroattiva',nome:'Retroattiva',e:'🔄',cls:'badge-success',desc:'Scritta dopo la sessione: gli Atti sono ciò che i giocatori hanno già compiuto. Ricompensa all\'inizio della sessione successiva.'},
  {id:'personale',nome:'Personale',e:'⭐',cls:'badge-gold',desc:'Storia personale di un Eroe. Il GM dovrebbe risolvere almeno un Atto per sessione.'},
];

const STATI_TRAMA=['In corso','Completata','Abbandonata'];

function blankTrama(){
  return {id:uid(),titolo:'',tipo:'stagionale',pg_id:'',tema:'',
    scopo:'',atti:[{id:uid(),testo:'',completato:false}],
    ricompensa:'',stato:'In corso',note:''};
}

function TramaModal({form,sf,onSave,onCancel,isNew,pg}){
  const f=(k,v)=>sf(p=>({...p,[k]:v}));
  const addAtto=()=>sf(p=>({...p,atti:[...p.atti,{id:uid(),testo:'',completato:false}]}));
  const upAtto=(idx,k,v)=>sf(p=>{const a=[...p.atti];a[idx]={...a[idx],[k]:v};return{...p,atti:a};});
  const delAtto=idx=>sf(p=>({...p,atti:p.atti.filter((_,i)=>i!==idx)}));
  const moveAtto=(idx,dir)=>sf(p=>{
    const a=[...p.atti];const to=idx+dir;
    if(to<0||to>=a.length)return p;
    [a[idx],a[to]]=[a[to],a[idx]];return{...p,atti:a};
  });
  const tipo=TIPI_TRAMA.find(t=>t.id===form.tipo);

  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onCancel();}},
    h('div',{className:'modal',style:{maxWidth:620}},
      h('div',{className:'modal-title'},isNew?'Nuova Trama':'Modifica Trama'),
      // Tipo selector
      h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:12}},
        TIPI_TRAMA.map(t=>h('button',{key:t.id,
          className:form.tipo===t.id?'btn-gold':'btn',
          onClick:()=>f('tipo',t.id),style:{flex:'1 1 auto',fontSize:11}},
          t.e+' '+t.nome
        ))
      ),
      tipo&&h('p',{style:{fontSize:11,color:'var(--text3)',fontStyle:'italic',marginBottom:10,lineHeight:1.5}},tipo.desc),
      // Titolo + Stato
      h('div',{className:'grid2',style:{marginBottom:10}},
        h('div',null,h('label',{className:'lbl'},'Titolo / Tema'),h('input',{value:form.titolo,onChange:e=>f('titolo',e.target.value),placeholder:'Es. Vendetta, Amore Perduto…'})),
        h('div',null,h('label',{className:'lbl'},'Stato'),h('select',{value:form.stato,onChange:e=>f('stato',e.target.value)},STATI_TRAMA.map(s=>h('option',{key:s},s))))
      ),
      // Personaggio collegato
      h('div',{style:{marginBottom:10}},
        h('label',{className:'lbl'},'Personaggio collegato (opzionale)'),
        h('select',{value:form.pg_id||'',onChange:e=>f('pg_id',e.target.value)},
          h('option',{value:''},'— Trama di campagna —'),
          (pg||[]).map(p=>h('option',{key:p.id,value:p.id},p.nome+' ('+p.tipo+')'))
        )
      ),
      // Scopo
      h('div',{style:{marginBottom:10}},
        h('label',{className:'lbl'},'Scopo (Obiettivo — scritto in terza persona)'),
        h('textarea',{value:form.scopo,onChange:e=>f('scopo',e.target.value),rows:2,placeholder:'Es. "Hector giace morto ai piedi di Leannán."'})
      ),
      // Atti
      h('div',{style:{marginBottom:10}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}},
          h('label',{className:'lbl',style:{margin:0}},'Atti ('+form.atti.length+')'),
          h('button',{className:'btn',style:{fontSize:11,padding:'2px 8px'},onClick:addAtto},'+ Atto')
        ),
        form.atti.map((atto,idx)=>h('div',{key:atto.id,style:{display:'flex',gap:6,alignItems:'flex-start',marginBottom:6}},
          h('span',{style:{fontFamily:'Cinzel,serif',fontSize:12,color:'var(--text3)',minWidth:18,paddingTop:8}},idx+1),
          h('textarea',{value:atto.testo,onChange:e=>upAtto(idx,'testo',e.target.value),
            rows:1,style:{flex:1,resize:'vertical',minHeight:34},
            placeholder:'Cosa devono fare gli Eroi…'}),
          h('div',{style:{display:'flex',flexDirection:'column',gap:2}},
            h('button',{className:'btn-ghost',style:{padding:'1px 5px',fontSize:11},onClick:()=>moveAtto(idx,-1),disabled:idx===0},'▲'),
            h('button',{className:'btn-ghost',style:{padding:'1px 5px',fontSize:11},onClick:()=>moveAtto(idx,1),disabled:idx===form.atti.length-1},'▼'),
            form.atti.length>1&&h('button',{className:'btn-danger',style:{padding:'1px 5px',fontSize:11},onClick:()=>delAtto(idx)},'×')
          )
        ))
      ),
      // Ricompensa
      h('div',{style:{marginBottom:10}},
        h('label',{className:'lbl'},'Ricompensa'),
        h('textarea',{value:form.ricompensa,onChange:e=>f('ricompensa',e.target.value),rows:2,
          placeholder:'Es. "Vantaggio Fautore di Miracoli (4pt)" o "Mischia Grado 3"'})
      ),
      h('div',null,h('label',{className:'lbl'},'Note'),h('textarea',{value:form.note,onChange:e=>f('note',e.target.value),rows:2})),
      h('div',{className:'form-actions'},h('button',{className:'btn',onClick:onCancel},'Annulla'),h('button',{className:'btn-gold',onClick:onSave},'✓ Salva'))
    )
  );
}

function TrameView({data,save,pg}){
  const[modal,setModal]=useState(null);const[form,sf]=useState(null);
  const[ex,setEx]=useState(null);const[ft,setFt]=useState('Tutto');
  const drag=useDragOrder(save);

  const filt=ft==='Tutto'?data:ft==='personale'?data.filter(t=>t.tipo==='personale'):ft==='campagna'?data.filter(t=>t.tipo!=='personale'):data.filter(t=>t.stato===ft);

  const sN=()=>{sf(blankTrama());setModal('new');};
  const sE=t=>{sf({...t,atti:[...t.atti.map(a=>({...a}))]});setModal(t.id);};
  const hSave=()=>{if(!form||!form.titolo.trim())return;modal==='new'?save(p=>[...p,form]):save(p=>p.map(t=>t.id===modal?form:t));setModal(null);sf(null);};
  const cx=()=>{setModal(null);sf(null);};
  const dl=id=>{if(window.confirm('Eliminare questa trama?'))save(p=>p.filter(t=>t.id!==id));};
  // Toggle atto completato direttamente dalla card
  const togAtto=(tramaId,attoId)=>save(p=>p.map(t=>t.id===tramaId?{...t,atti:t.atti.map(a=>a.id===attoId?{...a,completato:!a.completato}:a)}:t));

  return h(Fragment,null,
    h('div',{className:'sec-header'},h('h2',{className:'sec-title'},'Trame'),h('button',{className:'btn-gold',onClick:sN},'+ Nuova')),
    h('div',{className:'search-row'},
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},
        [{id:'Tutto',l:'Tutte'},{id:'campagna',l:'📅 Campagna'},{id:'personale',l:'⭐ Personali'},
         {id:'In corso',l:'In corso'},{id:'Completata',l:'✓ Completate'},{id:'Abbandonata',l:'✗ Abbandonate'}]
        .map(f=>h('button',{key:f.id,className:'stab'+(ft===f.id?' on':''),onClick:()=>setFt(f.id)},f.l))
      )
    ),
    filt.length===0&&h('div',{className:'empty'},'Nessuna trama. Creane una!'),
    h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
      filt.map(t=>{
        const tipo=TIPI_TRAMA.find(tp=>tp.id===t.tipo)||TIPI_TRAMA[0];
        const pgLinked=(pg||[]).find(p=>p.id===t.pg_id);
        const totAtti=t.atti.length;
        const compAtti=t.atti.filter(a=>a.completato).length;
        const pct=totAtti>0?Math.round(compAtti/totAtti*100):0;
        const isOpen=ex===t.id;

        return h('div',{key:t.id,className:'card'+(isOpen?' active-card':''),...drag.dragProps(t.id)},
          // Header
          h('div',{style:{display:'flex',alignItems:'flex-start',gap:10,cursor:'pointer'},onClick:()=>setEx(isOpen?null:t.id)},
            DRAG_HANDLE,
            h('span',{style:{fontSize:22,flexShrink:0,marginTop:2}},tipo.e),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}},
                h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:17}},t.titolo||h('em',{style:{color:'var(--text3)'}},'Senza titolo')),
                h('span',{className:'badge '+tipo.cls},tipo.nome),
                t.stato!=='In corso'&&h('span',{className:'badge '+(t.stato==='Completata'?'badge-success':'badge-dim')},t.stato==='Completata'?'✓ Completata':'✗ Abbandonata'),
                pgLinked&&h('span',{className:'badge badge-info',style:{fontSize:10}},pgLinked.nome)
              ),
              // Barra progresso atti
              h('div',{style:{display:'flex',alignItems:'center',gap:8,marginTop:2}},
                h('div',{style:{flex:1,height:4,background:'var(--bg3)',borderRadius:2,overflow:'hidden'}},
                  h('div',{style:{height:'100%',width:pct+'%',background:pct===100?'var(--success-fg)':'var(--gold3)',borderRadius:2,transition:'width .3s'}})
                ),
                h('span',{style:{fontSize:11,color:'var(--text3)',flexShrink:0}},compAtti+'/'+totAtti+' atti')
              ),
              !isOpen&&t.scopo&&h('p',{style:{fontSize:12,color:'var(--text3)',fontStyle:'italic',margin:'4px 0 0',lineHeight:1.5}},tr(t.scopo,90))
            ),
            h('div',{style:{display:'flex',gap:2,flexShrink:0},onClick:e=>e.stopPropagation()},
              h('button',{className:'btn-ghost',onClick:()=>sE(t)},'✎'),
              h('button',{className:'btn-danger',onClick:()=>dl(t.id)},'🗑')
            )
          ),

          // Expanded
          isOpen&&h('div',{style:{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'},onClick:e=>e.stopPropagation()},
            // Scopo
            t.scopo&&h('div',{className:'dblock',style:{marginBottom:8}},
              h('div',{className:'lore-label'},'SCOPO (OBIETTIVO)'),
              h('div',{style:{fontSize:13,color:'var(--text2)',fontStyle:'italic',lineHeight:1.7}},t.scopo)
            ),
            // Atti checklist
            h('div',{className:'dblock',style:{marginBottom:8}},
              h('div',{className:'lore-label',style:{marginBottom:6}},'ATTI — '+compAtti+'/'+totAtti+' completati'),
              t.atti.map((atto,idx)=>h('div',{key:atto.id,
                style:{display:'flex',alignItems:'flex-start',gap:8,padding:'6px 0',
                  borderBottom:'1px solid var(--border)',cursor:'pointer',
                  opacity:atto.completato?.6:1},
                onClick:()=>togAtto(t.id,atto.id)
              },
                h('div',{style:{width:18,height:18,flexShrink:0,marginTop:1,borderRadius:3,
                  border:'2px solid '+(atto.completato?'var(--success-fg)':'var(--border2)'),
                  background:atto.completato?'var(--success-bg)':'transparent',
                  display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}},
                  atto.completato&&h('span',{style:{fontSize:11,color:'var(--success-fg)',fontWeight:'bold'}},'✓')
                ),
                h('div',{style:{flex:1}},
                  h('span',{style:{fontSize:11,color:'var(--text3)',fontFamily:'Cinzel,serif',marginRight:6}},idx+1+'.'),
                  h('span',{style:{fontSize:13,color:'var(--text2)',
                    textDecoration:atto.completato?'line-through':'none'}},
                    atto.testo||h('em',{style:{color:'var(--text3)'}},'Atto non definito')
                  )
                )
              ))
            ),
            // Ricompensa
            t.ricompensa&&h('div',{className:'dblock',style:{marginBottom:8}},
              h('div',{className:'lore-label'},'RICOMPENSA'),
              h('div',{style:{fontSize:13,color:'var(--gold2)',lineHeight:1.7}},t.ricompensa)
            ),
            // Note
            t.note&&h('div',{className:'dblock'},
              h('div',{className:'lore-label'},'NOTE'),
              h('div',{style:{fontSize:13,color:'var(--text2)',whiteSpace:'pre-wrap',lineHeight:1.7}},t.note)
            )
          )
        );
      })
    ),
    modal&&form&&h(TramaModal,{form,sf,onSave:hSave,onCancel:cx,isNew:modal==='new',pg})
  );
}

// ═══════════════════════════ DASHBOARD ═══════════════════════════════════

  const ls=[...sess].sort((a,b)=>(b.numero||0)-(a.numero||0))[0];
  return h('div',null,
    h('div',{style:{fontFamily:'IM Fell English,serif',fontSize:28,color:'var(--gold)',marginBottom:4}},'Panoramica Campagna'),
    h('div',{style:{fontSize:14,color:'var(--text3)',marginBottom:20,fontStyle:'italic'}},'Il mondo di Théah ti aspetta, Capitano.'),
    h('div',{className:'metrics'},
      [{l:'Personaggi',v:pg.length,s:`${pg.filter(p=>p.tipo==='PG').length} PG · ${pg.filter(p=>p.tipo==='PNG').length} PNG`},{l:'Sessioni',v:sess.length,s:ls?`Ultima: #${ls.numero}`:'Nessuna ancora'},{l:'Fazioni',v:faz.length,s:`${faz.filter(f=>f.tipo==='Società Segreta').length} soc. segrete`},{l:'Luoghi',v:luo.length,s:`${luo.filter(l=>l.stato==='Visitato').length} visitati`},{l:'Note',v:note.length,s:`${note.filter(n=>n.categoria==='Trama').length} trame attive`}]
      .map(c=>h('div',{key:c.l,className:'metric'},h('div',{className:'m-label'},c.l),h('div',{className:'m-val'},c.v),h('div',{className:'m-sub'},c.s)))
    ),
    ls&&h(Fragment,null,
      h('div',{style:{fontFamily:'IM Fell English,serif',fontSize:16,color:'var(--gold2)',marginBottom:8}},'Ultima sessione'),
      h('div',{className:'card',style:{marginBottom:20}},h('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}},`Sessione ${ls.numero} · ${fmt(ls.data)}`),h('div',{style:{fontFamily:'IM Fell English,serif',fontSize:18,marginBottom:6}},ls.titolo),ls.pgs&&ls.pgs.length>0&&h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}},ls.pgs.map(id=>{const p=pg.find(p=>p.id===id);return p?h('span',{key:id,className:'tag'},p.nome):null;})),ls.riassunto&&h('div',{style:{fontSize:14,color:'var(--text2)',fontStyle:'italic'}},tr(ls.riassunto,250)))
    ),
    pg.filter(p=>p.stato==='Attivo').length>0&&h(Fragment,null,
      h('div',{style:{fontFamily:'IM Fell English,serif',fontSize:16,color:'var(--gold2)',marginBottom:8}},'Personaggi attivi'),
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}},pg.filter(p=>p.stato==='Attivo').map(p=>h('div',{key:p.id,className:'card',style:{padding:'8px 14px',display:'inline-flex',gap:8,alignItems:'center'}},h('span',{className:'badge '+(p.tipo==='PG'?'badge-info':'badge-warn')},p.tipo),h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:15}},p.nome))))
    ),
    pg.length===0&&sess.length===0&&h('div',{className:'card',style:{textAlign:'center',padding:'3rem',marginTop:20}},h('div',{style:{fontSize:48,marginBottom:12}},'⚓'),h('div',{style:{fontFamily:'IM Fell English,serif',fontSize:22,color:'var(--gold)',marginBottom:8}},'Benvenuto in Théah!'),h('div',{style:{fontSize:14,color:'var(--text3)',lineHeight:1.7}},'Usa le tab per gestire la tua campagna. Visita il ',h('strong',{style:{color:'var(--gold2)'}},'Compendio'),' per sfogliare nazioni, società, stregonerie e i Sette Mari.'))
  );
}

// ═══════════════════════════ APP ══════════════════════════════════════════
const NAV=[{id:'p',l:'Personaggi',e:'👥'},{id:'s',l:'Sessioni',e:'📅'},{id:'tr',l:'Trame',e:'📖'},{id:'f',l:'Fazioni',e:'🛡️'},{id:'l',l:'Luoghi',e:'📍'},{id:'n',l:'Note',e:'📝'},{id:'ref',l:'Riferimenti',e:'📚'},{id:'st',l:'Stregonerie',e:'✨'}];
function App(){
  const[pg,sPg]=useStore('7s-pg',[]);
  const[sess,sSe]=useStore('7s-sess',[]);
  const[note,sNo]=useStore('7s-note',[]);
  const[pnotes,sPnotes]=useStore('7s-pnotes',[]);
  const[faz,sFaz]=useStore('7s-faz',[]);
  const[luo,sLuo]=useStore('7s-luo',[]);
  const[trame,sTrame]=useStore('7s-trame',[]);
  const[nem,sNem]=useStore('7s-nem',[]);
  const[qmFavs,saveQmFavs]=useStore('7s-qm-fav',{});
  const[qmCustom,saveQmCustom]=useStore('7s-qm-custom',[]);
  const[sqFavs,saveSqFavs]=useStore('7s-sq-fav',{});
  const[sqCustom,saveSqCustom]=useStore('7s-sq-custom',[]);
  const[favs,saveFavs]=useStore('7s-str-fav',{});
  const[customStr,saveCustomStr]=useStore('7s-str-custom',[]);
  const[extraTratti,saveExtraTratti]=useStore('7s-str-extra',{});
  const[overrides,saveOverrides]=useStore('7s-str-ov',{});
  const[bgFavs,saveBgFavs]=useStore('7s-bg-fav',{});
  const[bgCustom,saveBgCustom]=useStore('7s-bg-custom',[]);
  const[vanFavs,saveVanFavs]=useStore('7s-van-fav',{});
  const[vanCustom,saveVanCustom]=useStore('7s-van-custom',[]);
  const[arcFavs,saveArcFavs]=useStore('7s-arc-fav',{});
  const[arcCustom,saveArcCustom]=useStore('7s-arc-custom',[]);
  const[tab,setTab]=useState('d');
  const[settingsOpen,setSettingsOpen]=useState(false);
  const[backupMsg,setBackupMsg]=useState('');

  // ── Esporta backup ──────────────────────────────────────────────────────
  const esportaBackup=()=>{
    const data={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('7s-')) data[k]=localStorage.getItem(k);
    }
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`7thsea_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setBackupMsg('✓ Backup scaricato!');
    setTimeout(()=>setBackupMsg(''),3000);
  };

  // ── Importa backup (merge) ──────────────────────────────────────────────
  const importaBackup=(full)=>{
    const input=document.createElement('input');
    input.type='file';input.accept='.json';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(full){
            // Ripristino completo: cancella tutto prima
            const keys=[];
            for(let i=0;i<localStorage.length;i++){
              const k=localStorage.key(i);
              if(k&&k.startsWith('7s-')) keys.push(k);
            }
            keys.forEach(k=>localStorage.removeItem(k));
            let count=0;
            Object.entries(data).forEach(([k,v])=>{
              if(k.startsWith('7s-')){localStorage.setItem(k,v);count++;}
            });
            setBackupMsg(`✓ ${count} voci ripristinate! Ricarico...`);
          } else {
            // Ripristino parziale: aggiunge solo le chiavi mancanti, non tocca quelle esistenti
            let count=0;
            Object.entries(data).forEach(([k,v])=>{
              if(k.startsWith('7s-')&&localStorage.getItem(k)===null){
                localStorage.setItem(k,v);count++;
              }
            });
            setBackupMsg(count>0?`✓ ${count} voci aggiunte! Ricarico...`:'Nessuna voce mancante da ripristinare.');
            if(count>0) setTimeout(()=>window.location.reload(),1500);
            else setTimeout(()=>setBackupMsg(''),3000);
            return;
          }
          setTimeout(()=>window.location.reload(),1500);
        }catch{
          setBackupMsg('✗ File non valido');
          setTimeout(()=>setBackupMsg(''),3000);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  // ── Reset completo ──────────────────────────────────────────────────────
  const resetTutto=()=>{
    if(!window.confirm('Eliminare TUTTI i dati della campagna? Questa azione è irreversibile.'))return;
    const keys=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);if(k&&k.startsWith('7s-'))keys.push(k);
    }
    keys.forEach(k=>localStorage.removeItem(k));
    window.location.reload();
  };

  return h('div',{id:'app'},
    h('div',{id:'topbar'},
      h('div',{className:'logo',onClick:()=>setTab('d'),title:'Panoramica',
        style:{cursor:'pointer',flexShrink:0}},
        h('span',{style:{fontSize:24,animation:'pulse 4s ease-in-out infinite'}},'🧭'),h('span',{className:'title-text',style:{fontFamily:'IM Fell English,serif',fontSize:16,color:'var(--gold)',whiteSpace:'nowrap'}},"Diario dell'Eroe")
      ),
      h('div',{id:'nav',style:{flex:1,display:'flex',justifyContent:'center',flexWrap:'wrap'}},
        NAV.map(n=>h('button',{key:n.id,className:'nav-btn'+(tab===n.id?' active':''),onClick:()=>setTab(n.id)},
          n.e,' ',h('span',{className:'nav-label'},n.l)
        ))
      ),
      // ⚙️ Impostazioni
      h('div',{style:{flexShrink:0,position:'relative',padding:'0 8px'}},
        h('button',{
          onClick:()=>setSettingsOpen(v=>!v),
          title:'Impostazioni',
          style:{background:'transparent',border:'none',cursor:'pointer',
            fontSize:22,color:settingsOpen?'var(--gold)':'var(--text3)',
            lineHeight:1,padding:'4px',transition:'color .2s'}
        },'⚙️'),
        // Pannello impostazioni
        settingsOpen&&h('div',{
          style:{position:'absolute',right:0,top:'110%',
            background:'var(--bg2)',border:'1px solid var(--border2)',
            borderRadius:'var(--r)',boxShadow:'0 8px 24px rgba(0,0,0,.5)',
            minWidth:220,zIndex:200,padding:12}
        },
          // Chiudi cliccando fuori
          h('div',{
            style:{position:'fixed',inset:0,zIndex:-1},
            onClick:()=>setSettingsOpen(false)
          }),
          h('div',{style:{fontSize:11,color:'var(--text3)',fontFamily:'Cinzel,serif',
            textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}},
            '⚙️ Impostazioni'
          ),
          // Backup
          h('div',{style:{marginBottom:12}},
            h('div',{style:{fontSize:11,color:'var(--text3)',marginBottom:6}},'DATI'),
            h('button',{onClick:()=>{esportaBackup();setSettingsOpen(false);},
              style:{width:'100%',marginBottom:6,textAlign:'left',
                background:'var(--bg3)',border:'1px solid var(--border)',
                color:'var(--text2)',padding:'7px 10px',borderRadius:'var(--r2)',
                cursor:'pointer',fontSize:13}
            },'⬇ Esporta backup'),
            h('button',{onClick:()=>{importaBackup(false);setSettingsOpen(false);},
              style:{width:'100%',marginBottom:6,textAlign:'left',
                background:'var(--bg3)',border:'1px solid var(--border)',
                color:'var(--text2)',padding:'7px 10px',borderRadius:'var(--r2)',
                cursor:'pointer',fontSize:13}
            },'⬆ Ripristina (mantieni nuovi dati)'),
            h('button',{onClick:()=>{importaBackup(true);setSettingsOpen(false);},
              style:{width:'100%',marginBottom:6,textAlign:'left',
                background:'var(--bg3)',border:'1px solid var(--border)',
                color:'var(--text2)',padding:'7px 10px',borderRadius:'var(--r2)',
                cursor:'pointer',fontSize:13}
            },'⬆ Ripristina completo (sostituisce tutto)'),
            h('button',{onClick:()=>{resetTutto();setSettingsOpen(false);},
              style:{width:'100%',textAlign:'left',
                background:'var(--danger-bg)',border:'1px solid var(--danger-fg)',
                color:'var(--danger-fg)',padding:'7px 10px',borderRadius:'var(--r2)',
                cursor:'pointer',fontSize:13}
            },'🗑 Cancella tutti i dati')
          ),
          backupMsg&&h('div',{style:{fontSize:12,color:'var(--success-fg)',
            padding:'4px 0',textAlign:'center'}},backupMsg)
        )
      )
    ),
    h('div',{id:'content'},
      tab==='d'&&h(Dashboard,{pg,sess,note,faz,luo}),
      tab==='p'&&h(PersonaggiView,{data:pg,save:sPg}),
      tab==='s'&&h(SessioniView,{data:sess,save:sSe,pg}),
      tab==='tr'&&h(TrameView,{data:trame,save:sTrame,pg}),
      tab==='f'&&h(FazioniView,{data:faz,save:sFaz,pg}),
      tab==='l'&&h(LuoghiView,{data:luo,save:sLuo}),
      tab==='n'&&h(NoteView,{data:note,save:sNo,pnotes,savePnotes:sPnotes}),
      tab==='ref'&&h(RiferimentiView,{bgFavs,saveBgFavs,bgCustom,saveBgCustom,vanFavs,saveVanFavs,vanCustom,saveVanCustom,arcFavs,saveArcFavs,arcCustom,saveArcCustom}),
      tab==='st'&&h(StregoneerieView,{favs,saveFavs,customStr,saveCustomStr,extraTratti,saveExtraTratti,overrides,saveOverrides})
    )
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>

<script>
if('serviceWorker' in navigator){
  const sw=`self.addEventListener('install',e=>{e.waitUntil(caches.open('7thsea-v1').then(c=>c.add(self.location.pathname)));self.skipWaiting();});self.addEventListener('activate',e=>{self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧭 7th Sea — Diario dell'Eroe</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2e9d5;--bg2:#e8dfc8;--bg3:#ddd5b5;--bg4:#cfc79e;
  --text:#1a0f05;--text2:#3a2a12;--text3:#7a6040;
  --gold:#7a5510;--gold2:#5a3f0c;--gold3:#b8901c;
  --crimson:#1a3a6c;
  --border:#c4b090;--border2:#b09870;
  --r:6px;--r2:4px;
  --info-bg:#d5e8f5;--info-fg:#1a4a7c;
  --warn-bg:#f5e8cc;--warn-fg:#8b5a10;
  --danger-bg:#d5dff0;--danger-fg:#1a3a6c;
  --success-bg:#d5eed5;--success-fg:#2a6a2a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:16px;line-height:1.6}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
input,select,textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:7px 10px;font-family:'Crimson Pro',Georgia,serif;font-size:15px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--gold3)}
select option{background:var(--bg3)}
textarea{resize:vertical;min-height:60px}
button{cursor:pointer;font-family:'Crimson Pro',Georgia,serif;font-size:14px;border-radius:var(--r2);transition:all .15s}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:6px 14px}
.btn:hover{border-color:var(--gold3);color:var(--gold)}
.btn-gold{background:var(--gold3);border:1px solid var(--gold2);color:var(--gold);padding:6px 14px;font-weight:600}
.btn-gold:hover{background:var(--gold2);color:var(--text)}
.btn-ghost{background:transparent;border:1px solid transparent;color:var(--text3);padding:5px 9px}
.btn-ghost:hover{border-color:var(--border2);color:var(--text2)}
.btn-danger{background:transparent;border:1px solid transparent;color:var(--crimson);padding:5px 9px}
.btn-danger:hover{background:var(--danger-bg);border-color:#6b1818}
label.lbl{font-size:12px;color:var(--text3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
.card.hover{cursor:pointer;transition:border-color .2s}
.card.hover:hover{border-color:var(--border2)}
.card.active-card{border-color:var(--gold3)}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block}
.badge-success{background:var(--success-bg);color:var(--success-fg)}
.badge-danger{background:var(--danger-bg);color:var(--danger-fg)}
.badge-info{background:var(--info-bg);color:var(--info-fg)}
.badge-warn{background:var(--warn-bg);color:var(--warn-fg)}
.badge-gold{background:var(--bg3);color:var(--gold);border:1px solid var(--gold3)}
.badge-dim{background:var(--bg3);color:var(--text3)}
.tag{font-size:12px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--text3);border:1px solid var(--border);display:inline-block}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:13px;padding:3px 10px;border-radius:20px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{background:var(--info-bg);border-color:var(--info-fg);color:var(--info-fg)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text3);font-style:italic;font-size:15px}
.lore-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;margin-top:10px}
.lore-val{font-size:14px;color:var(--text2);margin-bottom:2px;font-style:italic}
#app{display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100}
#topbar .logo{font-family:'IM Fell English',serif;font-size:20px;color:var(--gold);display:flex;align-items:center;gap:8px;white-space:nowrap}
#nav{display:flex;gap:2px;overflow-x:auto;flex:1}
.nav-btn{padding:5px 12px;border-radius:var(--r2);border:1px solid transparent;background:transparent;color:var(--text3);font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:5px}
.nav-btn:hover{color:var(--text2);background:var(--bg3)}
.nav-btn.active{background:var(--bg3);border-color:var(--border2);color:var(--gold)}
#content{flex:1;padding:20px;max-width:900px;margin:0 auto;width:100%}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sec-title{font-family:'IM Fell English',serif;font-size:22px;color:var(--gold2)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(60,40,10,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:20px;width:100%;max-width:520px;margin:auto}
.modal-title{font-family:'IM Fell English',serif;font-size:18px;color:var(--gold2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.metric .m-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.metric .m-val{font-size:26px;font-family:'IM Fell English',serif;color:var(--gold);line-height:1}
.metric .m-sub{font-size:12px;color:var(--text3);margin-top:3px}
.dblock{background:var(--bg3);border-radius:var(--r2);padding:10px 12px;margin-top:6px;font-size:14px;color:var(--text2);white-space:pre-wrap;border-left:2px solid var(--border2)}
.search-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.subtabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.stab{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:13px}
.stab:hover{border-color:var(--border2);color:var(--text2)}
.stab.on{background:var(--bg3);border-color:var(--gold3);color:var(--gold)}
.gold-line{height:1px;background:linear-gradient(90deg,transparent,var(--gold3),transparent);margin:16px 0}
.sess-num{text-align:center;min-width:50px;flex-shrink:0}
.sess-num .sn-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.sess-num .sn-val{font-family:'IM Fell English',serif;font-size:24px;color:var(--gold2);line-height:1}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;letter-spacing:.04em}
.av-pg{background:var(--info-bg);color:var(--info-fg);border:1px solid var(--info-fg)}
.av-png{background:var(--warn-bg);color:var(--warn-fg);border:1px solid var(--warn-fg)}
.lore-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.lore-card:hover{border-color:var(--border2)}
.lore-card.open{border-color:var(--gold3)}
.lore-emoji{width:38px;height:38px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.anchor-pulse{animation:pulse 4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.8;text-shadow:0 0 8px var(--gold3)}50%{opacity:1;text-shadow:0 0 16px var(--gold)}}

/* ═══ CHARACTER SHEET MODAL ═══ */
.cs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:16px}
.cs-sheet{background:var(--bg2);border:1px solid var(--gold3);box-shadow:0 8px 48px rgba(0,0,0,.7),0 0 0 1px var(--border);max-width:880px;margin:0 auto;padding:16px;border-radius:var(--r);color:var(--text)}
/* Inputs dentro la scheda */
.cs-sheet input[type=text],.cs-sheet textarea{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:5px 8px;font-family:'Crimson Pro',Georgia,serif;font-size:14px;outline:none;width:100%;transition:border-color .15s}
.cs-sheet input[type=text]:focus,.cs-sheet textarea:focus{border-color:var(--gold3)}
.cs-sheet select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--r2);padding:4px 7px;font-family:'Cinzel',serif;font-size:11px;outline:none;width:100%;transition:border-color .15s}
.cs-sheet select:focus{border-color:var(--gold3)}
.cs-sheet select option{background:var(--bg3);color:var(--text)}
.cs-sheet textarea{resize:vertical}
/* Header sezioni */
.cs-hdr{background:var(--bg4);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-align:center;padding:5px 8px;text-transform:uppercase;border-bottom:1px solid var(--gold3)}
/* Pannelli interni */
.cs-panel{border:1px solid var(--border);border-radius:var(--r2);margin-bottom:9px;background:var(--bg3);overflow:hidden}
/* Riga header personaggio */
.cs-header-row{display:grid;grid-template-columns:180px 1fr;gap:10px;margin-bottom:14px;align-items:stretch}
.cs-hf-box{border:1px solid var(--border);border-radius:var(--r2);display:flex;flex-direction:column;overflow:hidden}
.cs-hf-row{display:grid;grid-template-columns:100px 1fr;border-bottom:1px solid var(--border)}
.cs-hf-row:last-child{border-bottom:none}
.cs-hf-lbl{background:var(--bg4);border-right:1px solid var(--border);font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;letter-spacing:.07em;color:var(--gold2);padding:6px 8px;display:flex;align-items:center;text-transform:uppercase}
.cs-hf-in{padding:4px 8px;display:flex;align-items:center;background:var(--bg3)}
/* Layout tre colonne */
.cs-cols{display:grid;grid-template-columns:175px 1fr 175px;gap:10px;align-items:start}
/* Blocco attributo */
.cs-attr-block{display:grid;grid-template-columns:40px 1fr;padding:6px 8px;border-bottom:1px solid var(--border);align-items:start;gap:6px}
.cs-attr-block:last-child{border-bottom:none}
.cs-attr-circle{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--gold3);background:var(--bg2);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--gold);flex-shrink:0}
.cs-attr-name{font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;letter-spacing:.09em;color:var(--text);text-transform:uppercase}
.cs-attr-desc{font-size:9.5px;color:var(--text3);font-style:italic;line-height:1.3;margin-top:1px}
.cs-pips{display:flex;gap:3px;margin-top:4px}
/* Pip attributo */
.cs-pip{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg2);cursor:pointer;flex-shrink:0;transition:background .12s,border-color .12s;position:relative}
.cs-pip:hover{border-color:var(--gold3)}
.cs-pip.on{background:var(--gold3);border-color:var(--gold2)}
.cs-pip.on::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;border-radius:50%;background:var(--bg2)}
/* Riga abilità */
.cs-skill-row{display:flex;align-items:center;padding:3px 8px;border-bottom:1px solid var(--border);gap:5px}
.cs-skill-row:last-child{border-bottom:none}
.cs-skill-name{font-family:'IM Fell English',serif;font-size:12px;flex:1;color:var(--text2)}
/* Pip abilità (più piccolo) */
.cs-spip{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--border2);background:var(--bg2);cursor:pointer;flex-shrink:0;transition:background .12s,border-color .12s;position:relative}
.cs-spip:hover{border-color:var(--gold3)}
.cs-spip.on{background:var(--gold3);border-color:var(--gold2)}
.cs-spip.on::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4px;height:4px;border-radius:50%;background:var(--bg2)}
/* Box gradi abilità */
.cs-grade-box{border:1px solid var(--border);background:var(--bg2);padding:6px 8px;font-size:9.5px;color:var(--text3);line-height:1.8;margin-bottom:8px;border-radius:var(--r2)}
.cs-grade-box strong{font-family:'Cinzel',serif;font-size:9px;color:var(--gold2)}
/* Pip punti eroe */
/* Pip punti eroe — rimossi, ora usa cs-ricc-* come la Ricchezza */
/* Ricchezza */
.cs-ricc-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cs-ricc-wrap{display:flex;align-items:center;justify-content:center;padding:8px;gap:10px}
.cs-ricc-diamond{width:40px;height:40px;background:var(--bg4);transform:rotate(45deg);border:1.5px solid var(--gold3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cs-ricc-num{transform:rotate(-45deg);font-family:'Cinzel',serif;font-weight:900;font-size:16px;color:var(--gold);user-select:none;min-width:20px;text-align:center}
.cs-ricc-btns{display:flex;flex-direction:column;gap:3px}
.cs-ricc-btn{width:20px;height:20px;background:var(--bg4);color:var(--gold);border:1px solid var(--border2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;border-radius:var(--r2);transition:all .12s}
.cs-ricc-btn:hover{background:var(--gold3);color:var(--text);border-color:var(--gold2)}
/* Aree di testo interne ai pannelli */
.cs-fama-body,.cs-vant-body,.cs-bg-body{padding:6px 8px}
.cs-fama-body textarea{min-height:44px;font-size:13px}
.cs-vant-body textarea{min-height:100px;font-size:13px}
.cs-bg-body textarea{min-height:70px;font-size:13px}
/* Spirale della morte */
.cs-spirale-inner{display:grid;grid-template-columns:1fr auto;gap:10px;padding:8px}
.cs-spirale-effects{font-size:11px;color:var(--text2);line-height:2}
.cs-spirale-effects strong{font-family:'Cinzel',serif;font-size:10px;color:var(--gold2)}
/* Griglia ferite — ora gestita via SVG inline */
/* Storie */
.cs-storie-row{display:grid;grid-template-columns:80px 1fr;border-bottom:1px solid var(--border);padding:4px 8px;align-items:center;gap:6px}
.cs-storie-row:last-child{border-bottom:none}
.cs-storie-lbl{font-family:'Cinzel',serif;font-size:9px;font-weight:700;color:var(--gold2);text-transform:uppercase;letter-spacing:.06em}
/* Arcani */
.cs-arcani-field{padding:5px 8px}
.cs-arcani-lbl{font-family:'Cinzel',serif;font-size:9.5px;font-weight:700;color:var(--gold2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.cs-arcani-field textarea{min-height:40px;font-size:13px}
/* Bottoni azioni */
.cs-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.cs-actions .btn-cs-save{background:var(--gold3);border:1px solid var(--gold2);color:var(--gold);font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:.08em;padding:8px 20px;cursor:pointer;border-radius:var(--r2);transition:all .15s}
.cs-actions .btn-cs-save:hover{background:var(--gold2);color:var(--text)}
.cs-actions .btn-cs-cancel{background:transparent;color:var(--text3);border:1px solid var(--border2);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;padding:8px 16px;cursor:pointer;border-radius:var(--r2);transition:all .15s}
.cs-actions .btn-cs-cancel:hover{border-color:var(--border);color:var(--text2)}
/* mini attr display in card */
.mini-attrs{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.mini-attr{display:flex;flex-direction:column;align-items:center;gap:2px}
.mini-attr-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'Cinzel',serif}
.mini-pips{display:flex;gap:2px}
.mini-pip{width:7px;height:7px;border-radius:50%;border:1px solid var(--border2);background:var(--bg3);flex-shrink:0}
.mini-pip.on{background:var(--gold3)}
@media(max-width:650px){.cs-cols{grid-template-columns:1fr}.cs-header-row{grid-template-columns:1fr}.cs-ricc-row{grid-template-columns:1fr}}
.drag-handle{cursor:grab;color:var(--text3);padding:2px 6px 2px 2px;line-height:1;flex-shrink:0;font-size:18px;align-self:center;user-select:none}
.drag-handle:hover{color:var(--text2)}
.drag-handle:active{cursor:grabbing}
.drag-over-top{border-top:2px solid var(--gold) !important}
.drag-over-bottom{border-bottom:2px solid var(--gold) !important}
@media(max-width:600px){
  /* ── Card personaggio: view rapida ── */
  .pg-edit-grid{grid-template-columns:1fr !important;justify-items:stretch !important}
  .pg-row-2col{grid-template-columns:1fr !important}
  .pg-skills-inner{grid-template-columns:1fr !important}
  /* ── Topbar: logo centrato + nav scrollabile sotto ── */
  #topbar{flex-direction:column;height:auto;padding:6px 0 0;gap:0}
  #topbar .logo{padding:0 16px 6px;justify-content:center;border-bottom:1px solid var(--border)}
  #nav{padding:4px 8px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;justify-content:flex-start}
  #nav::-webkit-scrollbar{display:none}
  .nav-btn{padding:5px 10px;font-size:16px;flex-direction:column;gap:1px;min-width:48px;align-items:center;justify-content:center}
  .nav-btn .nav-label{display:block !important;font-size:8px;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.8}

  /* ── Contenuto ── */
  #content{padding:10px 10px 24px}

  /* ── Card ── */
  .card{padding:10px 12px}

  /* ── Modal: slide-up da fondo schermo ── */
  .modal-overlay{padding:0;align-items:flex-end}
  .modal{border-radius:12px 12px 0 0;border-bottom:none;max-height:92dvh;overflow-y:auto;margin:0;max-width:100%}
  .modal-title{font-size:16px}

  /* ── Griglie: tutto su una colonna ── */
  .grid2,.grid3{grid-template-columns:1fr !important}
  .cs-cols{grid-template-columns:1fr !important}
  .cs-header-row{grid-template-columns:1fr !important}
  .cs-ricc-row{grid-template-columns:1fr !important}

  /* ── Form actions: pulsanti incolonnati ── */
  .form-actions{flex-direction:column-reverse;gap:6px}
  .form-actions button{width:100%;text-align:center}

  /* ── Sec header ── */
  .sec-header{gap:6px}
  .sec-title{font-size:20px}

  /* ── Subtab + stab ── */
  .subtabs{gap:4px}
  .stab{font-size:12px;padding:4px 10px}

  /* ── Ricerca ── */
  .search-row input,.search-row select{width:100%;max-width:100%}

  /* ── Touch targets più grandi ── */
  .btn,.btn-gold{min-height:38px;font-size:14px}
  button{min-height:32px}
  input,select,textarea{font-size:16px !important} /* evita zoom automatico iOS */

  /* ── Pill badge più leggibili ── */
  .badge{font-size:10px;padding:2px 7px}

  /* ── Spirale della morte ── */
  .wound-section{flex-direction:column;align-items:center}

  /* ── Scheda personaggio: pannelli impilati ── */
  .cs-panel{border-right:none !important;border-bottom:1px solid var(--border)}
  .cs-skills-grid{grid-template-columns:1fr 1fr !important}

  /* ── Note: griglia → colonna ── */
  [style*="auto-fit,minmax(230"]{grid-template-columns:1fr !important}
  [style*="auto-fit,minmax(250"]{grid-template-columns:1fr !important}

  /* ── Drag handle: più grande ── */
  .drag-handle{font-size:22px;padding:4px 10px 4px 4px}

  /* ── Panoramica: griglia → colonna ── */
  [style*="auto-fit,minmax(180"]{grid-template-columns:1fr !important}
  [style*="auto-fit,minmax(200"]{grid-template-columns:1fr !important}
}
</style>

// ═══════════════════════════ DRAG & DROP ════════════════════════════════
function useDragOrder(save){
  const[dragId,setDragId]=useState(null);
  const[overId,setOverId]=useState(null);

  const start=(e,id)=>{
    setDragId(id);
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',String(id));
  };
  const over=(e,id)=>{e.preventDefault();if(id!==dragId)setOverId(id);};
  const drop=(e,id)=>{
    e.preventDefault();
    if(!dragId||dragId===id){reset();return;}
    save(prev=>{
      const arr=[...prev];
      const fi=arr.findIndex(i=>i.id===dragId);
      const ti=arr.findIndex(i=>i.id===id);
      if(fi<0||ti<0) return prev;
      const[m]=arr.splice(fi,1);
      arr.splice(ti,0,m);
      return arr;
    });
    reset();
  };
  const reset=()=>{setDragId(null);setOverId(null);};

  const dragProps=id=>({
    draggable:true,
    onDragStart:e=>start(e,id),
    onDragOver:e=>over(e,id),
    onDrop:e=>drop(e,id),
    onDragEnd:reset,
    style:{
      opacity:dragId===id?.5:1,
      outline:overId===id&&dragId!==id?'2px solid var(--gold3)':'none',
      borderRadius:'var(--r)',
      transition:'opacity .15s',
    }
  });

  return{dragProps,isDragging:!!dragId};
}

function migrateChar(c){
  const base=blankChar();
  // Normalizza wounds: se arriva da vecchio formato (14 slot) taglia a 12
  const rawWounds=c.wounds||(Array(WOUND_TOTAL).fill(false));
  return {
    ...base,...c,
    skills:c.skills||blankSkills(),
    wounds:Array.from({length:WOUND_TOTAL},(_,i)=>rawWounds[i]||false),
    concetto:c.concetto||c.tratti||'',

function useStore(key,init){
  const[data,setData]=useState(()=>{try{const v=localStorage.getItem(key);return v?JSON.parse(v):init;}catch{return init;}});
  const save=useCallback(fn=>{setData(prev=>{const next=typeof fn==='function'?fn(prev):fn;try{localStorage.setItem(key,JSON.stringify(next));}catch{}return next;});},[key]);
  return[data,save];
}

function WoundGrid({wounds,onChange}){
  const cx=100,cy=100,R=78;
  const rad=(a,r)=>{const rr=r!=null?r:R;return{x:cx+rr*Math.cos(a*Math.PI/180),y:cy+rr*Math.sin(a*Math.PI/180)};};
  const wArr=Array.from({length:WOUND_TOTAL},(_,i)=>(wounds||[])[i]||false);
  const toggle=i=>{
    const w=[...wArr];
    if(w[i]){
      for(let j=i;j<WOUND_TOTAL;j++) w[j]=false;
    } else {
      for(let j=0;j<=i;j++) w[j]=true;
    }
    onChange(w);
  };

  const curLevel=STAR_INDICES.filter(i=>wArr[i]).length;
  const activeCount=wArr.filter(Boolean).length;

  const CIRCLE_IDX=ALL_WOUND_ANGLES.map((_,i)=>i).filter(i=>!STAR_INDICES.includes(i));
  const resetCircles=()=>{const w=[...wArr];CIRCLE_IDX.forEach(i=>{w[i]=false;});onChange(w);};
  const resetAll=()=>onChange(Array(WOUND_TOTAL).fill(false));

  const star=(px,py,r1,r2,n)=>Array.from({length:n*2},(_,i)=>{
    const a=i*Math.PI/n-Math.PI/2;
    return`${px+(i%2===0?r1:r2)*Math.cos(a)},${py+(i%2===0?r1:r2)*Math.sin(a)}`;
  }).join(' ');

  return h('div',null,
    h('svg',{viewBox:'0 0 200 200',width:'100%',
      style:{maxWidth:196,display:'block',margin:'0 auto',overflow:'visible'}},

      h('circle',{cx,cy,r:R,fill:'none',stroke:'#5a4020',
        strokeWidth:.8,strokeDasharray:'3 5'}),

      // ── Rosa dei venti centrale ──
      h('circle',{cx,cy,r:32,fill:'#1a1108',stroke:'#7a5520',strokeWidth:1.2}),
      h('circle',{cx,cy,r:24,fill:'none',stroke:'#3a2a15',strokeWidth:.6}),
      h('polygon',{points:star(cx,cy,31,7,4),fill:'#a87830',opacity:.85}),
      h('polygon',{points:star(cx,cy,18,9,8),fill:'#7a5520'}),
      h('circle',{cx,cy,r:9,fill:'#0f0a05',stroke:'#7a5520',strokeWidth:1}),
      h('circle',{cx,cy,r:4,fill:'#c9a84c'}),

      // ── 20 slot ferita ──
      ...ALL_WOUND_ANGLES.map((a,i)=>{
        const p=rad(a);
        const on=wArr[i];
        const isStar=STAR_INDICES.includes(i);
        const lvl=STAR_INDICES.indexOf(i)+1;

        if(isStar){
          return h('g',{key:'s'+i,onClick:()=>toggle(i),style:{cursor:'pointer'}},
            h('polygon',{
              points:star(p.x,p.y,11,5,4),
              fill:on?'#8b2020':'#2e2212',
              stroke:on?'#c9a84c':'#5a4020',
              strokeWidth:.9
            }),
            h('text',{x:p.x,y:p.y+.5,
              textAnchor:'middle',dominantBaseline:'middle',
              fill:on?'#c9a84c':'#7a6040',
              style:{fontFamily:'Cinzel,serif',fontSize:9,
                fontWeight:'700',pointerEvents:'none',userSelect:'none'}
            },lvl)
          );
        }else{
          return h('g',{key:'c'+i,onClick:()=>toggle(i),style:{cursor:'pointer'}},
            h('circle',{cx:p.x,cy:p.y,r:8,
              fill:on?'#8b2020':'#241a0d',
              stroke:on?'#bf4040':'#5a4020',
              strokeWidth:1.5}),
            on&&h('text',{x:p.x,y:p.y+.5,
              textAnchor:'middle',dominantBaseline:'middle',
              fill:'#e0cfa0',
              style:{fontSize:8,pointerEvents:'none',userSelect:'none'}
            },'✕')
          );
        }
      }).filter(Boolean),

      curLevel>0&&h('text',{x:cx,y:cy+1,textAnchor:'middle',dominantBaseline:'middle',
        fill:'#8b2020',style:{fontFamily:'Cinzel,serif',fontSize:9,
          fontWeight:'700',pointerEvents:'none'}
      },'Lv '+curLevel),
      h('text',{x:cx,y:cy+47,textAnchor:'middle',
        fill:'#7a6040',style:{fontFamily:'Cinzel,serif',fontSize:9,pointerEvents:'none'}
      },activeCount>0?`${activeCount} / ${WOUND_TOTAL}`:'')
    ),

    // ── Tasti reset ──
    h('div',{style:{display:'flex',gap:6,justifyContent:'center',marginTop:7}},
      h('button',{onClick:resetCircles,style:{
        fontSize:10,padding:'3px 12px',borderRadius:'var(--r2)',
        background:'var(--bg4)',border:'1px solid var(--border2)',
        color:'var(--text3)',cursor:'pointer',fontFamily:'Cinzel,serif',
        letterSpacing:'.04em',transition:'all .15s'
      }},'↺ Resetta ferite normali'),
      h('button',{onClick:resetAll,style:{
        fontSize:10,padding:'3px 12px',borderRadius:'var(--r2)',
        background:'var(--danger-bg)',border:'1px solid var(--crimson)',
        color:'var(--danger-fg)',cursor:'pointer',fontFamily:'Cinzel,serif',
        letterSpacing:'.04em',transition:'all .15s'
      }},'↺ Resetta tutto')
    )
  );
}

    {nome:'Incanti di Fortuna',items:[
      {id:'pf',nome:'Piccola Fortuna',t:'min',d:'Per la Scena, dopo un Rischio col Tratto Minore, sostituisci il risultato di un dado con 1 + Grado di Piccola Fortuna.'},
      {id:'er',nome:'Eroico',t:'min',d:'Dopo un Rischio col Tratto Minore, rilancia un numero di dadi pari al Grado (tieni i nuovi risultati anche se peggiori).'},
      {id:'ff',nome:'Fortuna Folle',t:'min',d:'Lancia dadi pari al Grado: i risultati possono essere passati ad altri Eroi da aggiungere a qualsiasi Rischio della Scena.'},
      {id:'gf',nome:'Grande Fortuna',t:'magg',d:'Somma il Grado al risultato di un singolo dado. Se arriva a 10 o più, il dado esplode.'},
      {id:'mi',nome:'Mitico',t:'magg',d:'Dopo un Rischio col Tratto Maggiore, rilancia dadi pari al Grado e scegli quale risultato usare per ogni dado.'},
      {id:'le',nome:'Leggenda',t:'magg',d:'Somma il Grado al proprio Tratto Maggiore per il resto della Scena.'},
    ]},
    {nome:'Incanti di Vigore',items:[
      {id:'bs',nome:'Battere gli Sgherri',t:'min',d:'Elimina dalla Scena una Squadra di Sgherri con Forza pari o inferiore al Grado.'},
      {id:'pft',nome:'Più Forte di Te',t:'min',d:'Aggiunge un numero di dadi pari al Grado+1 a qualsiasi Rischio di Vigore.'},
      {id:'bm',nome:'Battere il Malvagio',t:'magg',d:'Riduce la Forza di un Malvagio di un valore pari al Grado fino alla fine dell\'Episodio.'},
      {id:'pfc',nome:'Il Più Forte Che C\'è',t:'magg',d:'Aggiunge Incrementi pari al Grado a qualsiasi tiro di Vigore.'},
    ]},
    {nome:'Incanti di Grazia',items:[
      {id:'la',nome:'Lampo',t:'min',d:'Agisce come se avesse Incrementi extra pari al Grado (solo per determinare quando agisce, non spendibili).'},
      {id:'sv',nome:'Svanire',t:'min',d:'Per un\'ora per Grado, nessuno può localizzarti con mezzi naturali o soprannaturali. Non rende invisibili.'},
      {id:'pr',nome:'Primo',t:'min',d:'Ottiene Incrementi pari al Grado all\'inizio di una Sequenza d\'Azione. Chi ha più Gradi ha la priorità.'},
      {id:'cs',nome:'Colpo Sicuro',t:'magg',d:'Dopo aver determinato gli Incrementi per un Rischio con arma, tutti gli attacchi infliggono Ferite aggiuntive pari al Grado per un Round.'},
    ]},
    {nome:'Incanti di Panache',items:[
      {id:'ps',nome:'Percepire la Stregoneria',t:'min',d:'Percepisce chiunque dotato di Stregoneria entro 9m × Grado per una Scena.'},
      {id:'rn',nome:'Riparare la Nave',t:'min',d:'Tocca una nave: ripara istantaneamente 5 Colpi × Grado. Non può riparare Colpi Critici.'},
      {id:'rs',nome:'Resistere alla Stregoneria',t:'magg',d:'Quando qualcuno usa Stregoneria contro di te, annullala. Usabile Grado volte per sessione.'},
      {id:'fn',nome:'Fondersi alla Nave',t:'magg',d:'Afferrando il timone, Eroe e nave diventano un\'entità: +Grado Dadi Bonus a bordo. Una Ferita Drammatica all\'Eroe causa un Colpo Critico alla nave e viceversa.'},
    ]},
    {nome:'Incanti di Risolutezza',items:[
      {id:'dt',nome:'Il Dolore È Temporaneo',t:'min',d:'Guarisce istantaneamente 5 Ferite × Grado (non Ferite Drammatiche).'},
      {id:'np',nome:'Nessuna Paura',t:'min',d:'Riduce gli effetti della Paura dell\'Eroe di un valore pari al Grado fino alla fine della Scena.'},
      {id:'ve',nome:'Veglia Eterna',t:'magg',d:'In un\'area di 3m, l\'Eroe non può morire/mutilare/diventare Inerme per Grado albe/tramonti. Lasciare l\'area conclude l\'effetto.'},
      {id:'ri',nome:'Rinato',t:'magg',d:'Usabile solo alla morte: all\'alba successiva torna vivo e completamente guarito. La Risolutezza diminuisce di (5 − Grado).'},
    ]},
    {nome:'Incanti di Acume',items:[
      {id:'af',nome:'Afferrare Frecce',t:'min',d:'Con una mano libera, afferra proiettili diretti verso di lui (eccetto pallottole). Riduce il danno di Grado Ferite.'},
      {id:'es',nome:'Evocare Sidhe',t:'min',d:'Chiama il Sidhe più vicino. Più alto il Grado, più potente il Sidhe. Seelie di default; il GM può spendere 1 Punto Pericolo per un Unseelie.'},
      {id:'ap',nome:'Afferrare Pallottole',t:'magg',d:'Come Afferrare Frecce ma include le pallottole (nega la Ferita Drammatica automatica delle armi da fuoco). Usabile Grado volte per Episodio.'},
      {id:'ci',nome:'Circolo Sidhe',t:'magg',d:'Cerchio di 3m dal quale i Sidhe non possono entrare né usare magia. Dura Grado tramonti. Si muovere dal centro chiude il cerchio.'},
    ]},
    {nome:'I Cavalieri di Elilodd',items:[
      {id:'c_fes',nome:'Fesc delle Foreste',t:'cav',d:'Magg: Risolutezza · Min: Panache. Viveva nelle foreste, portava le doglianze delle creature naturali a Corte.'},
      {id:'c_beo',nome:'Beorhtsige lo Spezza-assedi',t:'cav',d:'Magg: Panache · Min: Vigore. Nessun assedio resisteva al suo valore, qualunque fronte.'},
      {id:'c_cer',nome:'Cerhelm l\'Acuto',t:'cav',d:'Magg: Grazia · Min: Acume. Rapido di lingua quanto di spada: la parlantina lo metteva nei guai, la lama lo tirava fuori.'},
      {id:'c_ceo',nome:'Ceolmund il Protettore',t:'cav',d:'Magg: Risolutezza · Min: Grazia. Restò in piedi subendo ogni colpo diretto ai suoi amici finché non inflisse il colpo mortale.'},
      {id:'c_dud',nome:'Dudda il Rotondo',t:'cav',d:'Magg: Vigore · Min: Risolutezza. Il personaggio comico delle favole; amava la vita più di ogni altro.'},
      {id:'c_dun',nome:'Dunstan lo Straniero',t:'cav',d:'Magg: Vigore · Min: Acume. Non avaloniano, ma nessuno lo considerava meno che un fratello.'},
      {id:'c_ead',nome:'Eadburg il Ricco',t:'cav',d:'Magg: Panache · Min: Acume. Rinunciò a tutti i beni terreni; la sua ricchezza era spirituale, non materiale.'},
      {id:'c_eal',nome:'Ealdraed il Vecchio',t:'cav',d:'Magg: Acume · Min: Grazia. Maestro di Re Elilodd, custode dell\'antica saggezza.'},
      {id:'c_fri',nome:'Frideswide il Pacifico',t:'cav',d:'Magg: Acume · Min: Risolutezza. Gettò la spada e ottenne il potere unico di richiamare i Cavalieri per la guerra.'},
      {id:'c_god',nome:'Godric il Pio',t:'cav',d:'Magg: Panache · Min: Risolutezza. Il primo a chiedere "perché": i Sidhe lo definirono "il più saggio".'},
      {id:'c_her',nome:'Hereward il Consigliere',t:'cav',d:'Magg: Acume · Min: Grazia. La voce della pazienza; con Hildraed copriva ogni strategia possibile.'},
      {id:'c_hil',nome:'Hildraed la Comandante',t:'cav',d:'Magg: Panache · Min: Vigore. La voce dell\'azione; opposta e complementare a Hereward.'},
      {id:'c_leo',nome:'Leofric il Beneamato',t:'cav',d:'Magg: Risolutezza · Min: Acume. Rimase di sentinella alle porte Seelie, cambiando le sorti della guerra contro gli Unseelie.'},
      {id:'c_mil',nome:'Mildgyd il Gentile',t:'cav',d:'Magg: Vigore · Min: Panache. Alto quasi due metri e mezzo, il classico gigante buono.'},
      {id:'c_osg',nome:'Osgar il Lanciere',t:'cav',d:'Magg: Grazia · Min: Risolutezza. Usava la lancia, non la spada; uccise un enorme cinghiale che aveva fermato tutti.'},
      {id:'c_pag',nome:'Paga il Dimenticato',t:'cav',d:'Magg: Grazia · Min: Panache. Nessun racconto, nessun ricordo — solo il nome inciso sulla tavola di Elilodd.'},
      {id:'c_sae',nome:'Saewine la Marinaia',t:'cav',d:'Magg: Panache · Min: Grazia. Prima donna Cavaliere, comandante della marina di Elilodd.'},
      {id:'c_sun',nome:'Sunngifu la Generosa',t:'cav',d:'Magg: Acume · Min: Vigore. Si spogliò dell\'armatura per aiutare un vecchio sconosciuto; era il Mago alleato del Re.'},
      {id:'c_wil',nome:'Wilfrith la Volitiva',t:'cav',d:'Magg: Risolutezza · Min: Vigore. Resistette a 15 anni di prigione e torture senza cedere; tornò in meno di una luna.'},
      {id:'c_wul',nome:'Wulfnoð l\'Ardito',t:'cav',d:'Magg: Vigore · Min: Grazia. Sempre primo sulla breccia, le sue sortite impulsive coglievano di sorpresa i nemici.'},
    ]},
  ]},

  por:{nome:'Porté',e:'🩸',c:'danger',cat:[
    {nome:'Marchi di Sangue',items:[
      {id:'mk_mi',nome:'Marchio Minore',t:'min',d:'Segna oggetti tenibili in mano. Il sorcier percepisce direzione e distanza del Marchio e può Trarli a sé.'},
      {id:'mk_ma',nome:'Marchio Maggiore',t:'magg',d:'Segna oggetti grandi, luoghi o persone. Permette di Camminare verso di essi. Un parente di primo grado è sempre un Marchio Maggiore gratuito.'},
    ]},
    {nome:'Abilità',items:[
      {id:'tr',nome:'Trarre',t:'min',d:'Apre un minuscolo portale verso un Marchio Minore e lo afferra. Il sorcier si infligge 1 Ferita Drammatica. Costa 1 Incremento in Sequenza d\'Azione.'},
      {id:'ca',nome:'Camminare',t:'magg',d:'Apre un portale verso un Marchio Maggiore e lo attraversa. Espone al Passaggio — tenere gli occhi chiusi e ignorare le voci. Costa 1 Ferita Drammatica. Per ogni compagno portato: +1 Punto Eroe.'},
      {id:'bl',nome:'Blessure (solo Malvagi)',t:'spec',d:'Apre una Ferita nel Mondo: il sorcier non paga il costo personale, è il mondo a sanguinare. Causa SEMPRE Corruzione, senza eccezioni.'},
    ]},
    {nome:'Limiti dei Marchi',items:[
      {id:'lim',nome:'Capacità per Grado',t:'spec',d:'Per ogni Grado di Stregoneria: 1 Marchio Maggiore e 2 Minori mantenuti contemporaneamente. Aggiungerne uno nuovo richiede di interrompere un vecchio.'},
    ]},
  ]},

  hex:{nome:'Hexenwerk',e:'💀',c:'dim',cat:[
    {nome:'Unguenti Maggiori',items:[
      {id:'cam',nome:'Camminata Spettrale',t:'magg',d:'L\'anima fuoriesce dal corpo: invisibile, può volare e attraversare muri. Soggetto agli effetti anti-non-morti. Se non rientra entro l\'alba/tramonto successivo, muore.'},
      {id:'lin',nome:'Lingua di Cadavere',t:'magg',d:'Pasta dalla lingua di un cadavere in belladonna: parla con un morto. 2 domande × Grado di Risolutezza. Il cadavere risponde con le conoscenze della vita, poi si riduce in polvere.'},
      {id:'occ',nome:'Occhio Spettrale',t:'magg',d:'Applicato sulle palpebre: vede spiriti, fantasmi e Mostri normalmente invisibili per una Scena.'},
      {id:'pane',nome:'Pane del Padrone',t:'magg',d:'Chi lo mangia può dare un solo ordine a una Squadra di Mostri non-morti. In alternativa: +1 Incremento nei Rischi sociali contro un Malvagio non-morto.'},
      {id:'porr',nome:'Porridge da Funerale',t:'magg',d:'Chi lo mangia: 1 Ferita Drammatica. Se muore entro un giorno, risorge come non-morto agli ordini dell\'hexe. Causa sempre Corruzione.'},
      {id:'prig',nome:'Prigione Spettrale',t:'magg',d:'Traccia una forma col composto: i non-morti non possono attraversarla né usare poteri soprannaturali attraverso di essa.'},
      {id:'san',nome:'Sangue del Morto',t:'magg',d:'Inserito in un non-morto (iniezione o ingestione), lo rende Inerme per il resto della Scena. Richiede grande quantità — inutile su un\'arma.'},
    ]},
    {nome:'Unguenti Minori',items:[
      {id:'bro',nome:'Brodo Nero',t:'min',d:'Conferisce una Qualità Mostruosa scelta a chi lo beve fino alla fine della Scena. Bere o far bere causa Corruzione.'},
      {id:'cip',nome:'Cipiglio d\'Inverno',t:'min',d:'Lama di ghiaccio: colpendo un non-morto (≥1 Ferita), lo stordisce per il rest del Round. Si frantuma dopo un uso.'},
      {id:'fla',nome:'Flagello Rovinoso',t:'min',d:'Colpendo un non-morto (≥1 Ferita), il GM non può spendere Punti Pericolo per le sue Qualità Mostruose fino alla fine del Round.'},
      {id:'fur',nome:'Furia Paterna',t:'min',d:'Paletto di agrifoglio benedetto: colpisce un non-morto Inerme e lo distrugge definitivamente — non può più essere resuscitato.'},
      {id:'lac',nome:'Lacrime dei Profeti',t:'min',d:'Applicato a un cadavere non toccato da Hexenwerk: il cadavere non potrà mai più essere riportato in vita.'},
      {id:'pie',nome:'Pietà Materna',t:'min',d:'Rimuove maledizioni, malattie e effetti debilitanti dei non-morti. Chi ha mangiato il Porridge e beve questo muore istantaneamente (senza diventare Mostro).'},
      {id:'ris',nome:'Risata di Primavera',t:'min',d:'Immunità alla Paura causata dai Mostri non-morti per una Scena.'},
      {id:'set',nome:'Sete Rossa',t:'min',d:'Tutti i Mostri non-morti presenti devono dirigere tutti i loro Attacchi su chi porta questo Unguento.'},
      {id:'sor',nome:'Sorriso d\'Estate',t:'min',d:'Guarisce una Ferita Drammatica causata da un non-morto alla fine della Scena.'},
      {id:'sos',nome:'Sospiro d\'Autunno',t:'min',d:'Chi lo beve dorme un sonno placido e ristoratore per una notte intera, senza incubi naturali o soprannaturali.'},
      {id:'vel_m',nome:'Veleno del Mietitore',t:'min',d:'Colpendo un non-morto (≥1 Ferita), infligge 1 Ferita aggiuntiva ogni volta che la creatura agisce fino alla fine del Round. Non negabili.'},
      {id:'vel_r',nome:'Veleno del Redivivo',t:'min',d:'Applicato a un\'arma: per un Round dopo essere sfoderata, infligge il doppio delle Ferite ai non-morti. Non funziona col dracheneisen.'},
      {id:'vel_v',nome:'Velo della Vedova',t:'min',d:'Rende immuni al primo attacco/effetto soprannaturale di un non-morto. Poi diventa polvere.'},
    ]},
  ]},

  mat:{nome:'Dar Matushki',e:'❄️',c:'info',cat:[
    {nome:'Doni',items:[
      {id:'cmd',nome:'Comando',t:'don',d:'Chiama un animale prescelto e gli dà qualsiasi ordine. 5 dadi, l\'Eroe spende gli Incrementi. Ordini appropriati: +2 Dadi Bonus.'},
      {id:'ill',nome:'Illuminare',t:'don',d:'Luce magica in 3,5m dall\'Eroe. I non-morti nella zona: 5 Ferite istantanee e −2 dadi per ogni Rischio.'},
      {id:'pur',nome:'Purificare',t:'don',d:'Ripulisce una stanza da tossine, veleni, malattie e sporcizia (effetto secondario: l\'alcol perde potenza).'},
      {id:'ric',nome:'Ricucire',t:'don',d:'Tocca un oggetto e lo riporta al suo stato originale. Non può migliorarlo oltre la qualità originale né riparare difetti di fabbrica.'},
      {id:'rig',nome:'Rigenerazione',t:'don',d:'Guarisce una Ferita Drammatica per ogni attivazione. Rigenera arti persi, cataratte, rotule rotte.'},
      {id:'tem',nome:'Tempesta',t:'don',d:'Placa o intensifica qualsiasi condizione meteorologica in atto (da pioggerella a tifone o viceversa).'},
      {id:'tra',nome:'Trasformazione',t:'don',d:'Assume la forma di un animale prescelto per una Scena. Mantiene tutte le abilità (se la forma lo permette). Vantaggioso: +2 Dadi Bonus.'},
      {id:'vis',nome:'Percezione (Vista)',t:'don',d:'Percepisce il mondo attraverso i sensi dell\'esemplare più vicino della specie animale scelta. Sensi particolarmente adatti: +2 Dadi Bonus.'},
    ]},
    {nome:'Restrizioni',items:[
      {id:'eff',nome:'Efficacia',t:'restr',d:'Limite: non cambiare mai corso d\'azione per paura. Penitenza: affrontare la propria più grande paura.'},
      {id:'cle',nome:'Clemenza',t:'restr',d:'Limite: mostrare sempre pietà ai nemici, non portare mai rancore. Penitenza: riparare un torto fatto a qualcuno.'},
      {id:'one',nome:'Onestà',t:'restr',d:'Limite: non mentire né nascondere la verità. Penitenza: un mese senza mai mentire.'},
      {id:'gen',nome:'Gentilezza',t:'restr',d:'Limite: aiutare sempre chi è in difficoltà, che sia amico o estraneo. Penitenza: aiutare qualcuno che ti ha fatto un torto.'},
      {id:'mod',nome:'Moderazione',t:'restr',d:'Limite: agire sempre con moderazione, mai nell\'eccesso. Penitenza: rinunciare all\'attività preferita per un mese.'},
    ]},
  ]},

  sor:{nome:'Sorte',e:'🕸️',c:'warn',cat:[
    {nome:'Trame',items:[
      {id:'let',nome:'Lettura',t:'spec',d:'Prerequisito per ogni altra Trama. Nessun costo (niente PE né Staffilate). Permette di vedere gli Arcani per il resto della Scena. In Sequenza d\'Azione: 1 Incremento.'},
      {id:'arc_mi',nome:'Arcani — Minore',t:'min',d:'1PE + 1 Staffilata. Attiva la Virtù o la Hubris del bersaglio. Virtù: benefici immediati. Hubris: il doppio dei benefici se attivata come prossima Azione.'},
      {id:'arc_ma',nome:'Arcani — Maggiore',t:'magg',d:'1PE + 1 Staffilata. Sceglie una carta dal Mazzo della Sorte che rimpiazza Virtù o Hubris del bersaglio per la Scena. Una volta per sessione.'},
      {id:'ben_mi',nome:'Benedizione — Minore',t:'min',d:'1+ Staffilate. Con un bacio, concede Dadi Bonus = Staffilate. Tutti da usare per un singolo Rischio entro la fine della Scena.'},
      {id:'ben_ma',nome:'Benedizione — Maggiore',t:'magg',d:'1PE + 1+ Staffilate. Come Minore, ma i Dadi Bonus possono essere divisi su più Rischi nella Scena.'},
      {id:'mal_mi',nome:'Maledizione — Minore',t:'min',d:'1+ Staffilate. Con un bacio, infligge Maledizione Grado = Staffilate. All\'attivazione (prima del lancio): il bersaglio rimuove 1 dado per Grado.'},
      {id:'mal_ma',nome:'Maledizione — Maggiore',t:'magg',d:'1+ Staffilate. Come Minore ma attivata dopo il lancio: rimuove 1 Incremento per Grado dal risultato.'},
      {id:'tra_mi',nome:'Trascinare — Minore',t:'min',d:'1 Staffilata. Trascina il bersaglio verso la Strega. Perde 1 Incremento. Può cadere da balconi o subire 1 Ferita da ostacoli fragili.'},
      {id:'tra_ma',nome:'Trascinare — Maggiore',t:'magg',d:'1PE + 1+ Staffilate. Trascina più bersagli (1 per Staffilata corrente). I bersagli subiscono sempre 1 Ferita. Con 1 ulteriore Incremento+Staffilata: immobilizza contro un ostacolo.'},
    ]},
    {nome:'Staffilate',items:[
      {id:'staf',nome:'Rimozione Staffilate',t:'spec',d:'In sangue: 1 Staffilata rimossa infligge Ferite pari al numero attuale di Staffilate. In sfortuna: 1 Staffilata rimossa dà al GM Punti Pericolo pari al numero attuale.'},
    ]},
  ]},

  san:{nome:'Sanderis',e:'😈',c:'warn',cat:[
    {nome:'Patto dell\'Oscurità',items:[
      {id:'osc_ma',nome:'Oscurità — Favore Maggiore',t:'magg',d:'Causare un\'eclissi o precipitare una vasta area nelle tenebre · Evocare una bestia d\'ombra che dà la caccia e uccide qualcuno.'},
      {id:'osc_mi',nome:'Oscurità — Favori Minori',t:'min',d:'Rendere buia una stanza · Osservare un\'area attraverso le ombre · Aprire un portale oscuro verso un\'ombra vicina · Far attaccare una creatura dalla sua ombra (1 Ferita/Azione) · Avvolgersi nelle ombre per essere irrintracciabile.'},
    ]},
    {nome:'Patto del Fuoco',items:[
      {id:'fuo_ma',nome:'Fuoco — Favore Maggiore',t:'magg',d:'Tempesta di fuoco che distrugge tutto entro 30m · Evocare un Mostro di fiamme che attacca i nemici.'},
      {id:'fuo_mi',nome:'Fuoco — Favori Minori',t:'min',d:'Controllare un fuoco ≤ falò · Estinguere tutte le fiamme libere in una stanza · Dare fuoco agli abiti (2 Ferite/Azione) · Ricostruire oggetto distrutto dal fuoco · Ricoprire un\'arma di fiamme (+1 Ferita, poi fondono).'},
    ]},
    {nome:'Patto del Freddo',items:[
      {id:'fre_ma',nome:'Freddo — Favore Maggiore',t:'magg',d:'Far precipitare una regione in un inverno improvviso (1km di raggio, vegetazione morta, laghi gelati, nevicate) · Causare una valanga.'},
      {id:'fre_mi',nome:'Freddo — Favori Minori',t:'min',d:'Congelare una persona/oggetto (protetto da danni mentre coperto di ghiaccio) · Plasmare ghiaccio esistente (anche chiavi precise) · Congelare acqua immobile su 9m² · Creare oggetto di ghiaccio per una Scena · Frantumare un blocco di ghiaccio con un tocco.'},
    ]},
    {nome:'Patto della Tempesta',items:[
      {id:'tem_ma',nome:'Tempesta — Favore Maggiore',t:'magg',d:'Richiamare un uragano/tornado (2km di distruzione) · Evocare un fulmine mortale durante una tempesta.'},
      {id:'tem_mi',nome:'Tempesta — Favori Minori',t:'min',d:'Creare vento costante in una direzione per una Scena · Calmare/potenziare una tempesta esistente · Conferire capacità di invocare fulmini/tuoni · Corrente ascensionale per salti impossibili · Scagliare un fulmine che sbalza la creatura di 3m (3 Ferite se colpisce muri).'},
    ]},
    {nome:'Patto del Mare',items:[
      {id:'mar_ma',nome:'Mare — Favore Maggiore',t:'magg',d:'Creare un\'onda apocalittica che spazza via una città costiera · Evocare un Mostro degli abissi che affonda una nave.'},
      {id:'mar_mi',nome:'Mare — Favori Minori',t:'min',d:'Conoscere posizione di ogni nave entro 10 miglia marine · Agitare/calmare le acque · Respirare e vedere sott\'acqua per una Scena · Alzare/abbassare il livello dell\'acqua di 1,5m (30cm/minuto) · Purificare 22,5 litri d\'acqua da tossine.'},
    ]},
    {nome:'Patto della Conoscenza',items:[
      {id:'con_ma',nome:'Conoscenza — Favore Maggiore',t:'magg',d:'Separare mente e corpo di una creatura (il corpo resta vivo ma immobile, la mente imprigionata) · Cancellare un ricordo specifico da molte persone nelle ultime 24h.'},
      {id:'con_mi',nome:'Conoscenza — Favori Minori',t:'min',d:'Rispondere sì/no a una domanda su eventi passati · Trovare la posizione esatta e la natura di qualsiasi oggetto · Scoprire qualsiasi informazione perduta · Cancellare un ricordo specifico da una persona · Ripristinare per una Scena una mente danneggiata.'},
    ]},
    {nome:'Patto dell\'Amore',items:[
      {id:'amo_ma',nome:'Amore — Favore Maggiore',t:'magg',d:'Far innamorare follemente qualcuno (ossessione malata, farà qualsiasi cosa) · Fare impazzire e attaccare tutti entro 150m dal losejas.'},
      {id:'amo_mi',nome:'Amore — Favori Minori',t:'min',d:'Conoscere il rapporto tra due persone solo guardandole · Intensificare o calmare le emozioni di una creatura · Conoscere la più grande paura/amore/desiderio di qualcuno · Scoprire se qualcuno mente · Spingere qualcuno a cedere agli istinti più bassi.'},
    ]},
  ]},

  lae_removed:null, // rimossa su richiesta
};

const LORE_STR_IDS=Object.keys(TRATTI_STR).filter(k=>k!=='lae_removed');

function blankCustomStr(){
  return {id:uid(),nome:'',e:'✨',c:'secondary',cat:[{nome:'Tratti',items:[]}]};
}

const BADGE_TRATTO={
  min:{testo:'Minore',cls:'badge-info'},
  magg:{testo:'Maggiore',cls:'badge-gold'},
  cav:{testo:'Cavaliere',cls:'badge-dim'},
  spec:{testo:'Speciale',cls:'badge-warn'},
  don:{testo:'Dono',cls:'badge-success'},
  restr:{testo:'Restrizione',cls:'badge-warn'},
};

function CustomStrModal({form,sf,onSave,onCancel,isNew}){
  const f=(k,v)=>sf(p=>({...p,[k]:v}));
  const setCatNome=v=>sf(p=>({...p,cat:[{...p.cat[0],nome:v},...p.cat.slice(1)]}));
  const traits=form.cat[0]?.items||[];
  const addTrait=()=>sf(p=>{const items=[...p.cat[0].items,{id:uid(),nome:'',t:'min',d:''}];return{...p,cat:[{...p.cat[0],items}]};});
  const upd=(idx,k,v)=>sf(p=>{const items=[...p.cat[0].items];items[idx]={...items[idx],[k]:v};return{...p,cat:[{...p.cat[0],items}]};});
  const rem=idx=>sf(p=>({...p,cat:[{...p.cat[0],items:p.cat[0].items.filter((_,i)=>i!==idx)}]}));
  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onCancel();}},
    h('div',{className:'modal',style:{maxWidth:620}},
      h('div',{className:'modal-title'},isNew?'Nuova Stregoneria':'Modifica Stregoneria'),
      h('div',{className:'grid3',style:{marginBottom:10}},
        h('div',null,h('label',{className:'lbl'},'Nome'),h('input',{value:form.nome,onChange:e=>f('nome',e.target.value),placeholder:'Nome della stregoneria'})),
        h('div',null,h('label',{className:'lbl'},'Simbolo (emoji)'),h('input',{value:form.e,onChange:e=>f('e',e.target.value),style:{fontSize:20}})),
        h('div',null,h('label',{className:'lbl'},'Colore'),h('select',{value:form.c,onChange:e=>f('c',e.target.value)},
          h('option',{value:'info'},'Blu'),
          h('option',{value:'warn'},'Ambra'),
          h('option',{value:'danger'},'Rosso'),
          h('option',{value:'success'},'Verde'),
          h('option',{value:'dim'},'Grigio')
        ))
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{className:'lbl'},'Categoria'),
        h('input',{value:form.cat[0]?.nome||'',onChange:e=>setCatNome(e.target.value),placeholder:'es. Tratti, Rune, Unguenti...'})
      ),
      h('div',{className:'lore-label',style:{marginBottom:6}},'TRATTI'),
      traits.length===0&&h('p',{style:{color:'var(--text3)',fontSize:13,marginBottom:8}},'Nessun tratto. Aggiungine uno.'),
      traits.map((t,idx)=>h('div',{key:t.id,style:{background:'var(--bg3)',borderRadius:'var(--r2)',padding:10,marginBottom:8}},
        h('div',{className:'grid3',style:{marginBottom:8}},
          h('div',null,h('label',{className:'lbl'},'Nome'),h('input',{value:t.nome,onChange:e=>upd(idx,'nome',e.target.value)})),
          h('div',null,h('label',{className:'lbl'},'Tipo'),h('select',{value:t.t,onChange:e=>upd(idx,'t',e.target.value)},
            h('option',{value:'min'},'Minore'),
            h('option',{value:'magg'},'Maggiore'),
            h('option',{value:'spec'},'Speciale')
          )),
          h('div',{style:{display:'flex',alignItems:'flex-end'}},
            h('button',{className:'btn-danger',style:{width:'100%'},onClick:()=>rem(idx)},'🗑 Rimuovi')
          )
        ),
        h('label',{className:'lbl'},'Descrizione'),
        h('textarea',{value:t.d,onChange:e=>upd(idx,'d',e.target.value),rows:2})
      )),
      h('button',{className:'btn',style:{width:'100%',marginBottom:10},onClick:addTrait},'+ Aggiungi Tratto'),
      h('div',{className:'form-actions'},
        h('button',{className:'btn',onClick:onCancel},'Annulla'),
        h('button',{className:'btn-gold',onClick:onSave},'✓ Salva')
      )
    )
  );
}

function StregoneerieView({favs,saveFavs,customStr,saveCustomStr,extraTratti,saveExtraTratti,overrides,saveOverrides}){
  const[sel,setSel]=useState('inc');
  const[modal,setModal]=useState(null);
  const[form,sf]=useState(null);
  const[trModal,setTrModal]=useState(null);
  const[trForm,stf]=useState(null);
  const[ovModal,setOvModal]=useState(null); // id tratto lore in modifica
  const[ovForm,sof]=useState(null);

  const isCustomSel=!LORE_STR_IDS.includes(sel);
  const strData=isCustomSel?customStr.find(s=>s.id===sel):TRATTI_STR[sel];
  const safeSel=strData?sel:'inc';
  const safeData=strData||(TRATTI_STR['inc']);
  const isCustomSafe=strData?isCustomSel:false;

  const extraKey=safeSel;
  const extra=(extraTratti[extraKey]||[]);
  const saveExtra=fn=>saveExtraTratti(p=>({...p,[extraKey]:fn(p[extraKey]||[])}));

  // Override: get effective version of a lore trait (overridden or original)
  const ovKey=(tId)=>`${safeSel}__${tId}`;
  const getOv=(t)=>overrides[ovKey(t.id)]||t;
  const hasOv=(t)=>!!overrides[ovKey(t.id)];
  const saveOv=(t,data)=>saveOverrides(p=>({...p,[ovKey(t.id)]:data}));
  const resetOv=(t)=>saveOverrides(p=>{const n={...p};delete n[ovKey(t.id)];return n;});

  const fk=id=>`${safeSel}__${id}`;
  const isFav=id=>!!favs[fk(id)];
  const toggleFav=id=>saveFavs(prev=>{const n={...prev};if(n[fk(id)])delete n[fk(id)];else n[fk(id)]=true;return n;});

  const favTraits=[];
  (safeData.cat||[]).forEach(cat=>cat.items.forEach(t=>{if(isFav(t.id))favTraits.push(getOv(t));}));
  extra.forEach(t=>{if(isFav(t.id))favTraits.push(t);});

  const openNew=()=>{sf(blankCustomStr());setModal('new');};
  const openEdit=s=>{sf(JSON.parse(JSON.stringify(s)));setModal(s.id);};
  const handleSave=()=>{
    if(!form||!form.nome.trim())return;
    if(modal==='new') saveCustomStr(prev=>[...prev,form]);
    else saveCustomStr(prev=>prev.map(s=>s.id===modal?form:s));
    setModal(null);sf(null);
  };
  const handleCancel=()=>{setModal(null);sf(null);};
  const delCustom=id=>{
    if(window.confirm('Eliminare questa stregoneria?')){
      saveCustomStr(prev=>prev.filter(s=>s.id!==id));
      if(safeSel===id)setSel('inc');
    }
  };

  const openNewTrait=()=>{stf({id:uid(),nome:'',t:'min',d:''});setTrModal('new');};
  const openEditTrait=t=>{stf({...t});setTrModal(t.id);};
  const saveTrait=()=>{
    if(!trForm||!trForm.nome.trim())return;
    if(trModal==='new') saveExtra(p=>[...p,trForm]);
    else saveExtra(p=>p.map(t=>t.id===trModal?trForm:t));
    setTrModal(null);stf(null);
  };
  const delTrait=id=>{if(window.confirm('Eliminare questo tratto?'))saveExtra(p=>p.filter(t=>t.id!==id));};

  // Override lore trait
  const openOvEdit=t=>{const ov=getOv(t);sof({...ov,_origId:t.id});setOvModal(t.id);};
  const saveOvTrait=()=>{
    if(!ovForm)return;
    saveOv({id:ovForm._origId},{nome:ovForm.nome,t:ovForm.t,d:ovForm.d,id:ovForm._origId});
    setOvModal(null);sof(null);
  };

  const dragCustom=useDragOrder(saveCustomStr);
  const dragExtra=useDragOrder(fn=>saveExtra(fn));

  const TraitRow=({t,isExtra,isLore})=>{
    const eff=isLore?getOv(t):t;
    const modified=isLore&&hasOv(t);
    const b=BADGE_TRATTO[eff.t]||{testo:eff.t,cls:'badge-dim'};
    const fav=isFav(t.id);
    return h('div',{
      style:{display:'flex',alignItems:'flex-start',gap:10,padding:'9px 0',borderBottom:'1px solid var(--border)'},
      ...(isExtra?dragExtra.dragProps(t.id):{})
    },
      isExtra&&DRAG_HANDLE,
      h('span',{style:{fontSize:18,flexShrink:0,marginTop:1}},safeData.e||'✨'),
      h('div',{style:{flex:1,minWidth:0}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:3}},
          h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:15}},eff.nome),
          h('span',{className:'badge '+b.cls},b.testo),
          isExtra&&h('span',{className:'badge badge-gold',style:{fontSize:9}},'Custom'),
          modified&&h('span',{className:'badge badge-warn',style:{fontSize:9}},'✎ Modificato')
        ),
        h('div',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.65}},eff.d)
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:2,flexShrink:0}},
        h('button',{onClick:()=>toggleFav(t.id),title:fav?'Rimuovi dai preferiti':'Aggiungi ai preferiti',
          style:{background:'transparent',border:'none',cursor:'pointer',
            fontSize:20,color:fav?'var(--gold)':'var(--text3)',padding:'2px 4px',lineHeight:1,transition:'color .15s'}
        },fav?'⭐':'☆'),
        isLore&&h('button',{className:'btn-ghost',onClick:()=>openOvEdit(t),style:{fontSize:11,padding:'2px 5px'},title:'Modifica tratto'},'✎'),
        isLore&&modified&&h('button',{className:'btn',onClick:()=>resetOv(t),style:{fontSize:10,padding:'2px 5px',color:'var(--text3)'},title:'Ripristina originale'},'↺'),
        isExtra&&h('button',{className:'btn-ghost',onClick:()=>openEditTrait(t),style:{fontSize:11,padding:'2px 5px'}},'✎'),
        isExtra&&h('button',{className:'btn-danger',onClick:()=>delTrait(t.id),style:{fontSize:11,padding:'2px 5px'}},'🗑')
      )
    );
  };

  return h(Fragment,null,
    h('div',{className:'sec-header'},
      h('h2',{className:'sec-title'},'Stregonerie'),
      h('button',{className:'btn-gold',onClick:openNew},'+ Nuova')
    ),
    h('div',{className:'subtabs',style:{marginBottom:16,flexWrap:'wrap'}},
      LORE_STR_IDS.map(id=>
        h('button',{key:id,className:'stab'+(safeSel===id?' on':''),onClick:()=>setSel(id)},
          TRATTI_STR[id].e,' ',TRATTI_STR[id].nome
        )
      ),
      customStr.length>0&&h('span',{style:{width:1,background:'var(--border)',margin:'0 4px',alignSelf:'stretch',display:'inline-block'}}),
      customStr.map(s=>
        h('button',{key:s.id,className:'stab'+(safeSel===s.id?' on':''),onClick:()=>setSel(s.id),...dragCustom.dragProps(s.id)},
          DRAG_HANDLE,s.e||'✨',' ',s.nome
        )
      )
    ),
    isCustomSafe&&h('div',{style:{display:'flex',gap:8,marginBottom:12}},
      h('button',{className:'btn',onClick:()=>openEdit(safeData)},'✎ Modifica'),
      h('button',{className:'btn-danger',onClick:()=>delCustom(safeData.id)},'🗑 Elimina')
    ),
    // Preferiti
    favTraits.length>0&&h(Fragment,null,
      h('div',{style:{display:'flex',alignItems:'center',gap:8,fontSize:11,
        color:'var(--gold)',fontFamily:'Cinzel,serif',
        textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},'⭐ Preferiti'),
      h('div',{className:'card',style:{marginBottom:8}},
        favTraits.map(t=>h(TraitRow,{key:t.id+'_fav',t,isExtra:false,isLore:false}))
      ),
      h('div',{style:{height:2,background:'linear-gradient(90deg,transparent,var(--gold3),transparent)',margin:'12px 0 16px'}})
    ),
    // Tratti lore per categoria
    (safeData.cat||[]).map(cat=>h('div',{key:cat.nome,style:{marginBottom:12}},
      h('div',{style:{fontSize:11,color:'var(--text3)',fontFamily:'Cinzel,serif',
        textTransform:'uppercase',letterSpacing:'.08em',
        marginBottom:6,paddingBottom:4,borderBottom:'1px solid var(--border2)'}},cat.nome),
      cat.items.length===0
        ?h('p',{style:{color:'var(--text3)',fontSize:13,padding:'8px 0'}},'Nessun tratto.')
        :h('div',{className:'card'},cat.items.map(t=>h(TraitRow,{key:t.id,t,isExtra:false,isLore:!isCustomSafe})))
    )),
    // Tratti extra
    h('div',{style:{marginTop:16,paddingTop:12,borderTop:'2px dashed var(--border2)'}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}},
        h('div',{style:{fontSize:11,color:'var(--gold2)',fontFamily:'Cinzel,serif',
          textTransform:'uppercase',letterSpacing:'.08em'}},
          '✚ Tratti Aggiuntivi'+(extra.length>0?' ('+extra.length+')':'')
        ),
        h('button',{className:'btn-gold',style:{fontSize:12,padding:'3px 10px'},onClick:openNewTrait},'+ Tratto')
      ),
      extra.length===0
        ?h('p',{style:{color:'var(--text3)',fontSize:13,fontStyle:'italic'}},'Nessun tratto aggiuntivo.')
        :h('div',{className:'card'},extra.map(t=>h(TraitRow,{key:t.id,t,isExtra:true,isLore:false})))
    ),
    // Modal nuova stregoneria custom
    modal&&form&&h(CustomStrModal,{form,sf,onSave:handleSave,onCancel:handleCancel,isNew:modal==='new'}),
    // Modal tratto extra
    trModal&&trForm&&h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget){setTrModal(null);stf(null);}}},
      h('div',{className:'modal',style:{maxWidth:500}},
        h('div',{className:'modal-title'},trModal==='new'?'Nuovo Tratto — '+safeData.nome:'Modifica Tratto'),
        h('div',{className:'grid2',style:{marginBottom:10}},
          h('div',null,h('label',{className:'lbl'},'Nome'),h('input',{value:trForm.nome,onChange:e=>stf(p=>({...p,nome:e.target.value}))})),
          h('div',null,h('label',{className:'lbl'},'Tipo'),h('select',{value:trForm.t,onChange:e=>stf(p=>({...p,t:e.target.value}))},
            h('option',{value:'min'},'Minore'),h('option',{value:'magg'},'Maggiore'),
            h('option',{value:'spec'},'Speciale'),h('option',{value:'don'},'Dono'),
            h('option',{value:'restr'},'Restrizione')
          ))
        ),
        h('div',null,h('label',{className:'lbl'},'Descrizione'),h('textarea',{value:trForm.d||'',onChange:e=>stf(p=>({...p,d:e.target.value})),rows:3})),
        h('div',{className:'form-actions'},
          h('button',{className:'btn',onClick:()=>{setTrModal(null);stf(null);}},'Annulla'),
          h('button',{className:'btn-gold',onClick:saveTrait},'✓ Salva')
        )
      )
    ),
    // Modal override tratto lore
    ovModal&&ovForm&&h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget){setOvModal(null);sof(null);}}},
      h('div',{className:'modal',style:{maxWidth:500}},
        h('div',{className:'modal-title'},'Modifica Tratto Lore — '+safeData.nome),
        h('div',{style:{padding:'6px 10px',background:'var(--warn-bg)',borderRadius:'var(--r2)',fontSize:12,color:'var(--warn-fg)',marginBottom:10}},
          '⚠ Stai modificando un tratto del manuale. Usa ↺ per ripristinare l\'originale.'
        ),
        h('div',{className:'grid2',style:{marginBottom:10}},
          h('div',null,h('label',{className:'lbl'},'Nome'),h('input',{value:ovForm.nome||'',onChange:e=>sof(p=>({...p,nome:e.target.value}))})),
          h('div',null,h('label',{className:'lbl'},'Tipo'),h('select',{value:ovForm.t||'min',onChange:e=>sof(p=>({...p,t:e.target.value}))},
            h('option',{value:'min'},'Minore'),h('option',{value:'magg'},'Maggiore'),
            h('option',{value:'spec'},'Speciale'),h('option',{value:'don'},'Dono'),
            h('option',{value:'cav'},'Cavaliere'),h('option',{value:'restr'},'Restrizione')
          ))
        ),
        h('div',null,h('label',{className:'lbl'},'Descrizione'),h('textarea',{value:ovForm.d||'',onChange:e=>sof(p=>({...p,d:e.target.value})),rows:4})),
        h('div',{className:'form-actions'},
          h('button',{className:'btn',onClick:()=>{setOvModal(null);sof(null);}},'Annulla'),
          h('button',{className:'btn-gold',onClick:saveOvTrait},'✓ Salva modifiche')
        )
      )
    )
  );
}

function BgCustomModal({form,sf,onSave,onCancel,isNew}){
  const f=(k,v)=>sf(p=>({...p,[k]:v}));
  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onCancel();}},
    h('div',{className:'modal',style:{maxWidth:560}},
      h('div',{className:'modal-title'},isNew?'Nuovo Background':'Modifica Background'),
      h('div',{className:'grid2',style:{marginBottom:10}},
        h('div',null,h('label',{className:'lbl'},'Nome'),h('input',{value:form.nome,onChange:e=>f('nome',e.target.value)})),
        h('div',null,h('label',{className:'lbl'},'Categoria'),h('select',{value:form.cat,onChange:e=>f('cat',e.target.value)},
          Object.entries(BG_CATS).map(([k,v])=>h('option',{key:k,value:k},v.e+' '+v.nome))
        ))
      ),
      h('div',{style:{marginBottom:10}},h('label',{className:'lbl'},'Descrizione'),h('textarea',{value:form.desc||'',onChange:e=>f('desc',e.target.value),rows:2})),
      h('div',{style:{marginBottom:10}},h('label',{className:'lbl'},'Peculiarità'),h('textarea',{value:form.pec||'',onChange:e=>f('pec',e.target.value),rows:2})),
      h('div',{className:'grid2',style:{marginBottom:10}},
        h('div',null,h('label',{className:'lbl'},'Vantaggi (uno per riga)'),h('textarea',{value:(form.van||[]).join('\n'),onChange:e=>f('van',e.target.value.split('\n').filter(Boolean)),rows:3})),
        h('div',null,h('label',{className:'lbl'},'Abilità (una per riga)'),h('textarea',{value:(form.abi||[]).join('\n'),onChange:e=>f('abi',e.target.value.split('\n').filter(Boolean)),rows:3}))
      ),
      h('div',null,h('label',{className:'lbl'},'Note'),h('input',{value:form.nota||'',onChange:e=>f('nota',e.target.value),placeholder:'Es. Solo Eroi femminili'})),
      h('div',{className:'form-actions'},h('button',{className:'btn',onClick:onCancel},'Annulla'),h('button',{className:'btn-gold',onClick:onSave},'✓ Salva'))
    )
  );
}

function BackgroundView({favs,saveFavs,customItems,saveCustom}){
  const[sel,setSel]=useState('base');
  const[modal,setModal]=useState(null);
  const[form,sf]=useState(null);

  const cat=BG_CATS[sel];
  const loreInSel=BG_ITEMS.filter(i=>i.cat===sel);
  const customInSel=customItems.filter(i=>i.cat===sel);
  const display=[...loreInSel,...customInSel];

  const isFav=id=>!!favs[id];
  const toggleFav=id=>saveFavs(p=>{const n={...p};n[id]?delete n[id]:n[id]=true;return n;});
  const allFav=[...BG_ITEMS,...customItems].filter(i=>isFav(i.id));

  const drag=useDragOrder(saveCustom);

  const blankBg=()=>({id:uid(),nome:'',cat:sel,desc:'',pec:'',van:[],abi:[],nota:'',isCustom:true});
  const startNew=()=>{sf(blankBg());setModal('new');};
  const startEdit=i=>{sf({...i,van:[...(i.van||[])],abi:[...(i.abi||[])]});setModal(i.id);};
  const handleSave=()=>{
    if(!form||!form.nome.trim())return;
    if(modal==='new') saveCustom(p=>[...p,form]);
    else saveCustom(p=>p.map(i=>i.id===modal?form:i));
    setModal(null);sf(null);
  };
  const handleCancel=()=>{setModal(null);sf(null);};
  const del=id=>{if(window.confirm('Eliminare questo background?'))saveCustom(p=>p.filter(i=>i.id!==id));};

  const cmap={info:{bg:'var(--info-bg)',fg:'var(--info-fg)'},warn:{bg:'var(--warn-bg)',fg:'var(--warn-fg)'},danger:{bg:'var(--danger-bg)',fg:'var(--danger-fg)'},success:{bg:'var(--success-bg)',fg:'var(--success-fg)'},dim:{bg:'var(--bg3)',fg:'var(--text3)'}};
  const cs=c=>cmap[c]||cmap.dim;

  const BgCard=({item,isFavSec})=>{
    const fav=isFav(item.id);
    const catInfo=BG_CATS[item.cat]||{e:'📜',c:'dim'};
    return h('div',{className:'card',style:{marginBottom:6},...(item.isCustom&&!isFavSec?drag.dragProps(item.id):{})},
      h('div',{style:{display:'flex',alignItems:'flex-start',gap:10}},
        item.isCustom&&!isFavSec&&DRAG_HANDLE,
        h('div',{style:{width:34,height:34,borderRadius:'var(--r)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,background:cs(catInfo.c).bg}},catInfo.e),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:4}},
            h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:16}},item.nome),
            item.isCustom&&h('span',{className:'badge badge-gold'},'Custom'),
            item.nota&&h('span',{className:'badge badge-warn'},item.nota)
          ),
          item.desc&&h('div',{style:{fontSize:13,color:'var(--text3)',fontStyle:'italic',marginBottom:6}},item.desc),
          item.pec&&h('div',{style:{fontSize:13,color:'var(--text2)',marginBottom:6}},
            h('span',{className:'lore-label',style:{display:'inline',marginRight:4,fontFamily:'Cinzel,serif',fontSize:10,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em'}},'Peculiarità: '),
            item.pec
          ),
          h('div',{style:{display:'flex',gap:12,flexWrap:'wrap'}},
            item.van&&item.van.length>0&&h('div',null,
              h('div',{className:'lore-label'},'VANTAGGI'),
              h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginTop:2}},
                item.van.map((v,i)=>h('span',{key:i,className:'tag',style:{background:'var(--bg4)',color:'var(--gold2)',border:'1px solid var(--gold3)',fontSize:11}},v))
              )
            ),
            item.abi&&item.abi.length>0&&h('div',null,
              h('div',{className:'lore-label'},'ABILITÀ'),
              h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',marginTop:2}},
                item.abi.map((a,i)=>h('span',{key:i,className:'tag',style:{fontSize:11}},a))
              )
            )
          )
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:4,flexShrink:0}},
          h('button',{onClick:()=>toggleFav(item.id),title:fav?'Rimuovi dai preferiti':'Aggiungi ai preferiti',style:{background:'transparent',border:'none',cursor:'pointer',fontSize:18,color:fav?'var(--gold)':'var(--text3)',lineHeight:1,transition:'color .15s'}},fav?'⭐':'☆'),
          item.isCustom&&!isFavSec&&h('button',{className:'btn-ghost',onClick:()=>startEdit(item),style:{fontSize:12,padding:'2px 6px'}},'✎'),
          item.isCustom&&!isFavSec&&h('button',{className:'btn-danger',onClick:()=>del(item.id),style:{fontSize:12,padding:'2px 6px'}},'🗑')
        )
      )
    );
  };

  return h(Fragment,null,
    h('div',{className:'sec-header'},h('h2',{className:'sec-title'},'Background'),h('button',{className:'btn-gold',onClick:startNew},'+ Aggiungi')),
    h('div',{className:'subtabs',style:{marginBottom:16,flexWrap:'wrap'}},
      Object.entries(BG_CATS).map(([id,c])=>h('button',{key:id,className:'stab'+(sel===id?' on':''),onClick:()=>setSel(id)},c.e,' ',c.nome))
    ),
    // Preferiti
    allFav.length>0&&h(Fragment,null,
      h('div',{style:{fontSize:11,color:'var(--gold)',fontFamily:'Cinzel,serif',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},'⭐ Preferiti'),
      allFav.map(item=>h(BgCard,{key:item.id+'_f',item,isFavSec:true})),
      h('div',{style:{height:2,background:'linear-gradient(90deg,transparent,var(--gold3),transparent)',margin:'12px 0 16px'}})
    ),
    // Lista per categoria
    display.length===0&&h('div',{className:'empty'},'Nessun background in questa categoria.'),
    display.map(item=>h(BgCard,{key:item.id,item,isFavSec:false})),
    modal&&form&&h(BgCustomModal,{form,sf,onSave:handleSave,onCancel:handleCancel,isNew:modal==='new'})
  );
}

function VanCustomModal({form,sf,onSave,onCancel,isNew}){
  const f=(k,v)=>sf(p=>({...p,[k]:v}));
  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onCancel();}},
    h('div',{className:'modal'},
      h('div',{className:'modal-title'},isNew?'Nuovo Vantaggio':'Modifica Vantaggio'),
      h('div',{className:'grid2',style:{marginBottom:10}},
        h('div',null,h('label',{className:'lbl'},'Nome'),h('input',{value:form.nome,onChange:e=>f('nome',e.target.value)})),
        h('div',null,h('label',{className:'lbl'},'Costo'),h('select',{value:form.cat,onChange:e=>f('cat',e.target.value)},
          Object.entries(VAN_CATS).map(([k,v])=>h('option',{key:k,value:k},v.e+' '+v.nome))
        ))
      ),
      h('div',{className:'grid2',style:{marginBottom:10}},
        h('div',null,h('label',{className:'lbl'},'Tipo'),h('select',{value:form.tipo||'',onChange:e=>f('tipo',e.target.value)},
          h('option',{value:''},'—'),h('option',{value:'T'},'⚙️ Talento'),h('option',{value:'I'},'🏠 Innato')
        )),
        h('div',null,h('label',{className:'lbl'},'Restrizione'),h('input',{value:form.restr||'',onChange:e=>f('restr',e.target.value),placeholder:'es. Solo Castilliani'}))
      ),
      h('div',null,h('label',{className:'lbl'},'Descrizione'),h('textarea',{value:form.desc||'',onChange:e=>f('desc',e.target.value),rows:3})),
      h('div',{className:'form-actions'},h('button',{className:'btn',onClick:onCancel},'Annulla'),h('button',{className:'btn-gold',onClick:onSave},'✓ Salva'))
    )
  );
}

function VantaggiView({favs,saveFavs,customItems,saveCustom}){
  const[sel,setSel]=useState('p1');
  const[modal,setModal]=useState(null);
  const[form,sf]=useState(null);

  const loreInSel=VAN_ITEMS.filter(i=>i.cat===sel);
  const customInSel=customItems.filter(i=>i.cat===sel);
  const display=[...loreInSel,...customInSel];

  const isFav=id=>!!favs[id];
  const toggleFav=id=>saveFavs(p=>{const n={...p};n[id]?delete n[id]:n[id]=true;return n;});
  const allFav=[...VAN_ITEMS,...customItems].filter(i=>isFav(i.id));

  const drag=useDragOrder(saveCustom);

  const blankVan=()=>({id:uid(),nome:'',cat:sel,tipo:'',restr:'',desc:'',isCustom:true});
  const startNew=()=>{sf(blankVan());setModal('new');};
  const startEdit=i=>{sf({...i});setModal(i.id);};
  const handleSave=()=>{
    if(!form||!form.nome.trim())return;
    if(modal==='new') saveCustom(p=>[...p,form]);
    else saveCustom(p=>p.map(i=>i.id===modal?form:i));
    setModal(null);sf(null);
  };
  const handleCancel=()=>{setModal(null);sf(null);};
  const del=id=>{if(window.confirm('Eliminare questo vantaggio?'))saveCustom(p=>p.filter(i=>i.id!==id));};

  const cmap={success:{bg:'var(--success-bg)',fg:'var(--success-fg)'},info:{bg:'var(--info-bg)',fg:'var(--info-fg)'},warn:{bg:'var(--warn-bg)',fg:'var(--warn-fg)'},danger:{bg:'var(--danger-bg)',fg:'var(--danger-fg)'},dim:{bg:'var(--bg3)',fg:'var(--text3)'}};
  const cs=c=>cmap[c]||cmap.dim;

  const VanCard=({item,isFavSec})=>{
    const fav=isFav(item.id);
    const catInfo=VAN_CATS[item.cat]||{e:'?',c:'dim'};
    return h('div',{className:'card',style:{marginBottom:6},...(item.isCustom&&!isFavSec?drag.dragProps(item.id):{})},
      h('div',{style:{display:'flex',alignItems:'flex-start',gap:10}},
        item.isCustom&&!isFavSec&&DRAG_HANDLE,
        h('div',{style:{width:34,height:34,borderRadius:'var(--r)',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:cs(catInfo.c).bg,color:cs(catInfo.c).fg,fontFamily:'Cinzel,serif',fontWeight:700,fontSize:13}},
          item.cat==='p1'?'1':item.cat==='p2'?'2':item.cat==='p3'?'3':item.cat==='p4'?'4':'5'
        ),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:4}},
            h('span',{style:{fontFamily:'IM Fell English,serif',fontSize:16}},item.nome),
            item.tipo==='T'&&h('span',{className:'badge badge-warn'},'⚙️ Talento'),
            item.tipo==='I'&&h('span',{className:'badge badge-dim'},'🏠 Innato'),
            item.restr&&h('span',{className:'badge badge-info',style:{fontSize:10}},item.restr),
            item.isCustom&&h('span',{className:'badge badge-gold'},'Custom')
          ),
          h('div',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.65}},item.desc)
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:4,flexShrink:0}},
          h('button',{onClick:()=>toggleFav(item.id),title:fav?'Rimuovi dai preferiti':'Aggiungi ai preferiti',style:{background:'transparent',border:'none',cursor:'pointer',fontSize:18,color:fav?'var(--gold)':'var(--text3)',lineHeight:1,transition:'color .15s'}},fav?'⭐':'☆'),
          item.isCustom&&!isFavSec&&h('button',{className:'btn-ghost',onClick:()=>startEdit(item),style:{fontSize:12,padding:'2px 6px'}},'✎'),
          item.isCustom&&!isFavSec&&h('button',{className:'btn-danger',onClick:()=>del(item.id),style:{fontSize:12,padding:'2px 6px'}},'🗑')
        )
      )
    );
  };

  return h(Fragment,null,
    h('div',{className:'sec-header'},h('h2',{className:'sec-title'},'Vantaggi'),h('button',{className:'btn-gold',onClick:startNew},'+ Aggiungi')),
    h('div',{className:'subtabs',style:{marginBottom:16}},
      Object.entries(VAN_CATS).map(([id,c])=>h('button',{key:id,className:'stab'+(sel===id?' on':''),onClick:()=>setSel(id)},c.e,' ',c.nome,' ('+VAN_ITEMS.filter(v=>v.cat===id).length+')'))
    ),
    allFav.length>0&&h(Fragment,null,
      h('div',{style:{fontSize:11,color:'var(--gold)',fontFamily:'Cinzel,serif',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}},'⭐ Preferiti'),
      allFav.map(item=>h(VanCard,{key:item.id+'_f',item,isFavSec:true})),
      h('div',{style:{height:2,background:'linear-gradient(90deg,transparent,var(--gold3),transparent)',margin:'12px 0 16px'}})
    ),
    display.length===0&&h('div',{className:'empty'},'Nessun vantaggio in questa categoria.'),
    display.map(item=>h(VanCard,{key:item.id,item,isFavSec:false})),
    modal&&form&&h(VanCustomModal,{form,sf,onSave:handleSave,onCancel:handleCancel,isNew:modal==='new'})
  );
}
